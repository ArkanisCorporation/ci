name: dotnet-pack-nuget local smoke fixture

on:
  workflow_dispatch:

permissions: {}

jobs:
  pack:
    # Expected: success.
    name: Pack sample NuGet project
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Pack sample project
        uses: ./.github/actions/dotnet-pack-nuget
        with:
          project: tests/fixtures/mock-projects/dotnet-nuget-library/src/Mock.NuGet.Library/Mock.NuGet.Library.csproj
          version: 1.2.3-ci.1
          dotnet-version: 10.0.x
          enable-cache: "false"
          runs-on-json: '["ubuntu-latest"]'
          dotnet-setversion-working-directory: tests/fixtures/mock-projects/dotnet-nuget-library
          artifact-name: dotnet-pack-nuget-local

      - name: Verify package files
        run: |
          test -f artifacts/nuget/Arkanis.CI.Mock.NuGet.Library.1.2.3-ci.1.nupkg
          test -f artifacts/artifact-manifest.json
        shell: bash
