name: .NET NuGet library local fixture

on:
  workflow_dispatch:

permissions: {}

jobs:
  dotnet-format:
    # Expected: success.
    name: dotnet-nuget-library format @ local
    uses: ./.github/workflows/wf-dotnet-format.yml
    permissions:
      contents: read
    with:
      runs-on: ubuntu-latest
      runs-on-self-hosted: false
      dotnet-version: 10.0.x
      working-directory: tests/fixtures/mock-projects/dotnet-nuget-library
      solution: Mock.NuGet.Library.slnx
      restore-locked-mode: true
      restore-tools: false
      install-tool: true
      tool-version: 2026.1.4
      enable-cache: false
    secrets:
      NUGET_AUTH_JSON: >-
        {"version":1,"sources":[{"name":"github","source":"https://nuget.pkg.github.com/ArkanisCorporation/index.json","username":"github://actor","password":"github://token","validAuthenticationTypes":"Basic"}]}

  dotnet-test:
    # Expected: success.
    name: dotnet-nuget-library test @ local
    uses: ./.github/workflows/wf-dotnet-test.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      runs-on: ubuntu-latest
      runs-on-self-hosted: false
      dotnet-version: 10.0.x
      solution: tests/fixtures/mock-projects/dotnet-nuget-library/Mock.NuGet.Library.slnx
      restore-locked-mode: true
      enable-cache: false
      coverage: true
      coverage-report: true
      coverage-pr-comment: false
    secrets:
      NUGET_AUTH_JSON: >-
        {"version":1,"sources":[{"name":"github","source":"https://nuget.pkg.github.com/ArkanisCorporation/index.json","username":"github://actor","password":"github://token","validAuthenticationTypes":"Basic"}]}
