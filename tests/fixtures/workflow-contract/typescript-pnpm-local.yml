name: TypeScript pnpm local fixture

on:
  workflow_dispatch:

permissions: {}

jobs:
  node-setup:
    # Expected: success.
    name: typescript-pnpm setup @ local
    uses: ./.github/workflows/wf-setup-node.yml
    permissions:
      contents: read
    with:
      runs-on: ubuntu-latest
      runs-on-self-hosted: false
      node-version: 24.x
      package-manager: pnpm
      package-manager-version: "10"
      working-directory: tests/fixtures/mock-projects/typescript-pnpm
      enable-cache: false
      upload-diagnostics: false

  node-lint:
    # Expected: success.
    name: typescript-pnpm lint @ local
    uses: ./.github/workflows/wf-node-lint.yml
    permissions:
      contents: read
    with:
      runs-on: ubuntu-latest
      runs-on-self-hosted: false
      node-version: 24.x
      package-manager: pnpm
      package-manager-version: "10"
      working-directory: tests/fixtures/mock-projects/typescript-pnpm
      enable-cache: false
      upload-diagnostics: false

  node-test:
    # Expected: success.
    name: typescript-pnpm test @ local
    uses: ./.github/workflows/wf-node-test.yml
    permissions:
      contents: read
    with:
      runs-on: ubuntu-latest
      runs-on-self-hosted: false
      node-version: 24.x
      package-manager: pnpm
      package-manager-version: "10"
      working-directory: tests/fixtures/mock-projects/typescript-pnpm
      enable-cache: false
      upload-diagnostics: false

  node-build:
    # Expected: success.
    name: typescript-pnpm build @ local
    uses: ./.github/workflows/wf-node-build.yml
    permissions:
      contents: read
    with:
      runs-on: ubuntu-latest
      runs-on-self-hosted: false
      node-version: 24.x
      package-manager: pnpm
      package-manager-version: "10"
      working-directory: tests/fixtures/mock-projects/typescript-pnpm
      enable-cache: false
      upload-diagnostics: false
