name: Dotnet consumer fixture

on:
  pull_request:

permissions: {}

jobs:
  dotnet-format:
    name: Example.slnx format @ ${{ github.head_ref || github.ref_name }}
    uses: ArkanisCorporation/ci/.github/workflows/wf-dotnet-format.yml@v1
    permissions:
      contents: read
    with:
      runs-on: ubuntu-latest
      runs-on-self-hosted: false
      dotnet-version: 10.0.x
      solution: Example.slnx

  dotnet-test:
    name: Example.slnx test @ ${{ github.head_ref || github.ref_name }}
    uses: ArkanisCorporation/ci/.github/workflows/wf-dotnet-test.yml@v1
    permissions:
      contents: read
      pull-requests: write
    with:
      runs-on: ubuntu-latest
      runs-on-self-hosted: false
      dotnet-version: 10.0.x
      solution: Example.slnx
      coverage: true
      coverage-report: true
      coverage-pr-comment: true
      upload-test-results: false
      upload-coverage: false
