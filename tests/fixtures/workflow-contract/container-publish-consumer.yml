name: Container publish consumer fixture

on:
  workflow_dispatch:

permissions: {}

jobs:
  publish:
    name: v1.2.3 @ container
    uses: ArkanisCorporation/ci/.github/workflows/wf-publish-container-dotnet.yml@v1
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    with:
      runs-on: ubuntu-latest
      runs-on-self-hosted: false
      image: ghcr.io/arkaniscorporation/example-web
      context: .
      dockerfile: Dockerfile
      version: 1.2.3
      version-tag: v1.2.3
      version-channel: stable
      channel-latest: true
      nuget-build-secret: true
      extra-tags: |
        latest
      environment-name: container
    secrets:
      REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NUGET_AUTH_JSON: ${{ secrets.NUGET_AUTH_JSON }}
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
