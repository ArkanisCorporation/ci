# Summary:
#   Runs this repository's validation and release automation after platform workflow self-tests pass.
# Remarks:
#   Pull requests exercise platform selftest and semantic-release verification through verify-release.yml.
#   This workflow publishes GitHub release metadata and updates mutable major version tags such as v1.
#   It does not publish NuGet packages, OCI images, deployments, or run semantic-release exec hooks.

name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  selftest:
    name: platform @ ${{ github.head_ref || github.ref_name }}
    uses: ./.github/workflows/wf-platform-selftest.yml
    permissions:
      contents: read
    with:
      runs-on-json: '["ubuntu-latest"]'
      runs-on-self-hosted: false

  release:
    name: repo @ publish
    needs: selftest
    uses: ./.github/workflows/wf-release-semantic.yml
    permissions:
      contents: write
      issues: write
      pull-requests: write
    with:
      runs-on-json: '["ubuntu-latest"]'
      runs-on-self-hosted: false
      environment-name: release
      extra-plugins: |
        semantic-release-major-tag@0.3.2
