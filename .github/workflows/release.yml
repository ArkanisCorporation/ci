# Summary:
#   Runs this repository's validation, fixture dogfood checks, and release automation.
# Remarks:
#   Pull requests exercise platform selftest, split fixture workflow calls, and semantic-release verification.
#   Main pushes and manual dispatches publish GitHub release metadata and update mutable major version tags such as v1.
#   It does not publish NuGet packages, OCI images, deployments, or run semantic-release exec hooks.

name: release

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  selftest:
    name: platform @ ${{ github.head_ref || github.ref_name }}
    uses: ./.github/workflows/wf-platform-selftest.yml
    permissions:
      contents: read
    with:
      runs-on: ${{ vars.RUNNER_DEFAULT || 'daedalus' }}
      runs-on-self-hosted: true

  typescript-pnpm-lint:
    name: typescript-pnpm lint @ ${{ github.head_ref || github.ref_name }}
    uses: ./.github/workflows/wf-node-lint.yml
    permissions:
      contents: read
    with:
      runs-on: ${{ vars.RUNNER_DEFAULT || 'daedalus' }}
      runs-on-self-hosted: true
      node-version: 24.x
      package-manager: pnpm
      package-manager-version: "10"
      working-directory: tests/fixtures/mock-projects/typescript-pnpm
      enable-cache: false

  typescript-pnpm-test:
    name: typescript-pnpm test @ ${{ github.head_ref || github.ref_name }}
    uses: ./.github/workflows/wf-node-test.yml
    permissions:
      contents: read
    with:
      runs-on: ${{ vars.RUNNER_DEFAULT || 'daedalus' }}
      runs-on-self-hosted: true
      node-version: 24.x
      package-manager: pnpm
      package-manager-version: "10"
      working-directory: tests/fixtures/mock-projects/typescript-pnpm
      enable-cache: false

  typescript-pnpm-build:
    name: typescript-pnpm build @ ${{ github.head_ref || github.ref_name }}
    uses: ./.github/workflows/wf-node-build.yml
    permissions:
      contents: read
    with:
      runs-on: ${{ vars.RUNNER_DEFAULT || 'daedalus' }}
      runs-on-self-hosted: true
      node-version: 24.x
      package-manager: pnpm
      package-manager-version: "10"
      working-directory: tests/fixtures/mock-projects/typescript-pnpm
      enable-cache: false

  dotnet-library-format:
    name: dotnet-nuget-library format @ ${{ github.head_ref || github.ref_name }}
    uses: ./.github/workflows/wf-dotnet-format.yml
    permissions:
      contents: read
    with:
      runs-on: ${{ vars.RUNNER_DEFAULT || 'daedalus' }}
      runs-on-self-hosted: true
      dotnet-version: 10.0.x
      working-directory: tests/fixtures/mock-projects/dotnet-nuget-library
      solution: Mock.NuGet.Library.slnx
      restore-locked-mode: true
      restore-tools: false
      install-tool: true
      tool-version: 2026.1.4
      enable-cache: false

  dotnet-library-test:
    name: dotnet-nuget-library test @ ${{ github.head_ref || github.ref_name }}
    uses: ./.github/workflows/wf-dotnet-test.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      runs-on: ${{ vars.RUNNER_DEFAULT || 'daedalus' }}
      runs-on-self-hosted: true
      dotnet-version: 10.0.x
      solution: tests/fixtures/mock-projects/dotnet-nuget-library/Mock.NuGet.Library.slnx
      restore-locked-mode: true
      enable-cache: false
      coverage: true
      coverage-report: true
      coverage-pr-comment: false

  dotnet-nuget:
    name: dotnet-nuget-verify @ ${{ github.head_ref || github.ref_name }}
    uses: ./.github/workflows/wf-verify-publish-nuget.yml
    permissions:
      contents: read
    with:
      runs-on: ${{ vars.RUNNER_DEFAULT || 'daedalus' }}
      runs-on-self-hosted: true
      project: tests/fixtures/mock-projects/dotnet-nuget-library/src/Mock.NuGet.Library/Mock.NuGet.Library.csproj
      version: 1.2.3-ci.1
      dotnet-version: 10.0.x
      enable-cache: false
      dotnet-setversion-working-directory: tests/fixtures/mock-projects/dotnet-nuget-library

  dotnet-container:
    name: dotnet-container-verify @ ${{ github.head_ref || github.ref_name }}
    uses: ./.github/workflows/wf-verify-publish-container-dotnet.yml
    permissions:
      contents: read
    with:
      runs-on: ${{ vars.RUNNER_DEFAULT || 'daedalus' }}
      runs-on-self-hosted: true
      image: local/mock-container-app
      context: tests/fixtures/mock-projects/dotnet-container-app
      dockerfile: tests/fixtures/mock-projects/dotnet-container-app/src/Mock.Container.App/Dockerfile
      version: 1.2.3-ci.1
      version-tag: v1.2.3-ci.1
      sdk-version: 10.0.x
      version-working-directory: tests/fixtures/mock-projects/dotnet-container-app
      labels: |
        org.opencontainers.image.source=https://github.com/ArkanisCorporation/ci

  verify-release:
    if: github.event_name == 'pull_request'
    name: repo
    needs:
      - selftest
      - typescript-pnpm-lint
      - typescript-pnpm-test
      - typescript-pnpm-build
      - dotnet-library-format
      - dotnet-library-test
      - dotnet-nuget
      - dotnet-container
    uses: ./.github/workflows/wf-verify-release-semantic.yml
    permissions:
      contents: write
    with:
      runs-on: ${{ vars.RUNNER_DEFAULT || 'daedalus' }}
      runs-on-self-hosted: true
      extra-plugins: |
        semantic-release-major-tag@0.3.2

  release:
    if: github.event_name != 'pull_request'
    name: repo @ publish
    needs:
      - selftest
      - typescript-pnpm-lint
      - typescript-pnpm-test
      - typescript-pnpm-build
      - dotnet-library-format
      - dotnet-library-test
      - dotnet-nuget
      - dotnet-container
    uses: ./.github/workflows/wf-release-semantic.yml
    permissions:
      contents: write
      issues: write
      pull-requests: write
    with:
      runs-on: ${{ vars.RUNNER_DEFAULT || 'daedalus' }}
      runs-on-self-hosted: true
      environment-name: release
      extra-plugins: |
        semantic-release-major-tag@0.3.2
