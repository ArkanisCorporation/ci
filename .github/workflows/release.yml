# Summary:
#   Runs this repository's validation and release automation after platform workflow self-tests pass.
# Remarks:
#   Pull requests exercise the same platform selftest and semantic-release workflow contract.
#   This workflow publishes GitHub release metadata only.
#   It does not publish NuGet packages, OCI images, deployments, or run semantic-release exec hooks.

name: release

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry-run:
        description: Run semantic-release without publishing tags or GitHub releases.
        type: boolean
        required: false
        default: false

permissions: {}

jobs:
  selftest:
    name: platform @ ${{ github.head_ref || github.ref_name }}
    uses: ./.github/workflows/wf-platform-selftest.yml
    permissions:
      contents: read
    with:
      runs-on-json: '["ubuntu-latest"]'
      runs-on-self-hosted: false

  release:
    name: repo @ ${{ inputs.dry-run && 'dry-run' || 'publish' }}
    needs: selftest
    uses: ./.github/workflows/wf-release-semantic.yml
    permissions:
      contents: write
      issues: write
      pull-requests: write
    with:
      runs-on-json: '["ubuntu-latest"]'
      runs-on-self-hosted: false
      dry-run: ${{ inputs.dry-run || false }}
      extra-plugins: ""
