# Summary:
#   Reusable .NET Docker Buildx workflow for publishing OCI images.
# Remarks:
#   This workflow runs in the caller repository context.
#   It always stamps .NET project versions before Docker Buildx runs.
#   It can use a remote BuildKit endpoint on self-hosted runners.
#   It forwards non-secret Docker build arguments to BuildKit.
#   It logs into the configured registry and may create or overwrite mutable tags.
#   Use wf-verify-publish-container-dotnet.yml for build-only verification.
#   Consumers should deploy image digests from the digest output instead of mutable tags.

name: wf-publish-container-dotnet

on:
  workflow_call:
    inputs:
      runs-on-json:
        description: JSON array passed to runs-on, including GitHub-hosted image labels or self-hosted runner labels.
        type: string
        required: false
        default: '["ubuntu-latest"]'
      runs-on-self-hosted:
        description: True when runs-on-json targets self-hosted runners.
        type: boolean
        required: false
        default: false
      environment-name:
        description: GitHub environment guarding image publication.
        type: string
        required: false
        default: container
      image:
        description: Fully-qualified image name without tag.
        type: string
        required: true
      context:
        description: Docker build context.
        type: string
        required: false
        default: .
      dockerfile:
        description: Dockerfile path.
        type: string
        required: false
        default: Dockerfile
      platforms:
        description: Comma-delimited target platforms.
        type: string
        required: false
        default: linux/amd64
      version:
        description: Required bare semantic version without leading v, used for .NET stamping and the VERSION Docker build argument.
        type: string
        required: true
      version-tag:
        description: Optional release version tag to apply to the image, usually prefixed with v.
        type: string
        required: false
        default: ""
      version-channel:
        description: Optional channel tag to apply.
        type: string
        required: false
        default: ""
      channel-latest:
        description: Adds a mutable <version-channel>-latest tag when version-channel is set.
        type: boolean
        required: false
        default: true
      extra-tags:
        description: Optional newline-delimited extra image tags. Bare tags expand as image:tag; full image references pass through.
        type: string
        required: false
        default: ""
      registry:
        description: Registry host used for docker/login-action.
        type: string
        required: false
        default: ghcr.io
      registry-username:
        description: Registry username; defaults to github.actor when empty.
        type: string
        required: false
        default: ""
      buildkit-endpoint:
        description: Optional remote BuildKit endpoint for self-hosted runners.
        type: string
        required: false
        default: ""
      build-args:
        description: Optional newline-delimited Docker build arguments. Do not pass secrets here because Docker build args can persist in image metadata or logs.
        type: string
        required: false
        default: ""
      sdk-version:
        description: .NET SDK version used by the dotnet-setversion action.
        type: string
        required: false
        default: 10.0.x
      global-json-file:
        description: Optional global.json path passed to actions/setup-dotnet for version stamping.
        type: string
        required: false
        default: ""
      version-working-directory:
        description: Working directory whose csproj files are stamped before Docker Buildx.
        type: string
        required: false
        default: .
      version-recursive:
        description: Recursively stamps csproj files under version-working-directory when true.
        type: boolean
        required: false
        default: true
      version-project:
        description: Optional project path passed to setversion when recursive stamping is false.
        type: string
        required: false
        default: ""
      version-tool-version:
        description: dotnet-setversion tool package version installed by the composite action.
        type: string
        required: false
        default: 4.0.0
      cache-from:
        description: Optional Docker Buildx cache-from value.
        type: string
        required: false
        default: ""
      cache-to:
        description: Optional Docker Buildx cache-to value.
        type: string
        required: false
        default: ""
      sbom:
        description: Docker Buildx sbom input.
        type: string
        required: false
        default: "true"
      provenance:
        description: Docker Buildx provenance input.
        type: string
        required: false
        default: mode=max
      labels:
        description: Optional newline-delimited OCI labels.
        type: string
        required: false
        default: ""
      timeout-minutes:
        description: Publish job timeout.
        type: number
        required: false
        default: 45
      artifact-retention-days:
        description: Metadata artifact retention in days.
        type: number
        required: false
        default: 30
    secrets:
      REGISTRY_TOKEN:
        description: Registry token; defaults to github.token when omitted.
        required: false
    outputs:
      digest:
        description: Image digest produced by docker/build-push-action.
        value: ${{ jobs.publish.outputs.digest }}
      metadata:
        description: Publish metadata JSON produced by docker/build-push-action.
        value: ${{ jobs.publish.outputs.metadata }}
      artifact-manifest:
        description: Path to the generated artifact manifest.
        value: ${{ jobs.publish.outputs.artifact-manifest }}

permissions: {}

jobs:
  publish:
    name: ${{ inputs.version-tag || inputs.version }} @ ${{ inputs.environment-name }}
    runs-on: ${{ fromJSON(inputs.runs-on-json) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    environment: ${{ inputs.environment-name }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      metadata: ${{ steps.build.outputs.metadata }}
      artifact-manifest: ${{ steps.manifest.outputs.path }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout caller @ ${{ github.repository }}:${{ github.head_ref || github.ref_name }}
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Validate runner contract @ ${{ inputs.runs-on-json }}
        env:
          RUNS_ON_SELF_HOSTED: ${{ inputs.runs-on-self-hosted }}
          RUNS_ON_JSON: ${{ inputs.runs-on-json }}
          BUILDKIT_ENDPOINT: ${{ inputs.buildkit-endpoint }}
        run: |
          mkdir -p artifacts/container artifacts/meta
          {
            echo "Runs on self-hosted: ${RUNS_ON_SELF_HOSTED}"
            echo "Requested runner labels: ${RUNS_ON_JSON}"
            echo "Runner OS: ${RUNNER_OS}"
            echo "Runner arch: ${RUNNER_ARCH}"
            echo "Remote BuildKit endpoint configured: $([[ -n "$BUILDKIT_ENDPOINT" ]] && echo true || echo false)"
            echo ".NET version stamping: true"
          } | tee artifacts/meta/runner-contract.txt

      - name: Validate container publish inputs @ ${{ inputs.image }}:${{ inputs.version-tag || inputs.version }}
        env:
          VERSION: ${{ inputs.version }}
          VERSION_PROJECT: ${{ inputs.version-project }}
          VERSION_RECURSIVE: ${{ inputs.version-recursive }}
        run: |
          if [[ -z "$VERSION" ]]; then
            echo "version is required for .NET container publishing." >&2
            exit 2
          fi

          if [[ "$VERSION" =~ ^[vV] ]]; then
            echo "version must be a bare semantic version without leading v. Use version-tag for Docker tags." >&2
            exit 2
          fi

          if [[ "$VERSION_RECURSIVE" == "true" && -n "$VERSION_PROJECT" ]]; then
            echo "version-project requires version-recursive to be false." >&2
            exit 2
          fi

      - name: Self-hosted preflight @ ${{ inputs.runs-on-json }}
        if: inputs.runs-on-self-hosted
        run: |
          {
            echo "## Self-hosted runner preflight"
            echo
            df -h .
            echo
            command -v docker
            docker version
          } | tee artifacts/meta/self-hosted-preflight.txt

      - name: Checkout platform action @ ${{ fromJSON(toJSON(job)).workflow_repository }}:${{ fromJSON(toJSON(job)).workflow_sha }}
        uses: actions/checkout@v7
        with:
          # fromJSON(toJSON(job)) is only there because our pinned actionlint:1.7.12 does not know the newer documented job.workflow_ref / job.workflow_sha fields.
          repository: ${{ fromJSON(toJSON(job)).workflow_repository }}
          ref: ${{ fromJSON(toJSON(job)).workflow_sha }}
          path: .ci/arkanis-ci
          persist-credentials: false
          sparse-checkout: |
            .github/actions/dotnet-setversion
          sparse-checkout-cone-mode: false

      - name: Stamp .NET projects @ ${{ inputs.version }}
        uses: ./.ci/arkanis-ci/.github/actions/dotnet-setversion
        with:
          version: ${{ inputs.version }}
          working-directory: ${{ inputs.version-working-directory }}
          dotnet-version: ${{ inputs.sdk-version }}
          global-json-file: ${{ inputs.global-json-file }}
          recursive: ${{ inputs.version-recursive }}
          project: ${{ inputs.version-project }}
          tool-version: ${{ inputs.version-tool-version }}

      - name: Remove platform action @ .ci/arkanis-ci
        if: always()
        run: rm -rf .ci/arkanis-ci

      - name: Set up Docker Buildx @ local
        if: inputs.buildkit-endpoint == ''
        uses: docker/setup-buildx-action@v4

      - name: Set up Docker Buildx @ remote
        if: inputs.buildkit-endpoint != ''
        uses: docker/setup-buildx-action@v4
        with:
          driver: remote
          endpoint: ${{ inputs.buildkit-endpoint }}

      - name: Resolve image tags @ ${{ inputs.image }}:${{ inputs.version-tag || inputs.version }}
        id: tags
        env:
          IMAGE: ${{ inputs.image }}
          VERSION_TAG: ${{ inputs.version-tag }}
          VERSION_CHANNEL: ${{ inputs.version-channel }}
          CHANNEL_LATEST: ${{ inputs.channel-latest }}
          EXTRA_TAGS: ${{ inputs.extra-tags }}
        run: |
          short_sha="${GITHUB_SHA::12}"
          {
            echo "tags<<TAGS"
            echo "${IMAGE}:sha-${short_sha}"
            if [[ -n "$VERSION_TAG" ]]; then
              echo "${IMAGE}:${VERSION_TAG}"
            fi
            if [[ -n "$VERSION_CHANNEL" ]]; then
              echo "${IMAGE}:${VERSION_CHANNEL}"
              if [[ "$CHANNEL_LATEST" == "true" ]]; then
                echo "${IMAGE}:${VERSION_CHANNEL}-latest"
              fi
            fi
            while IFS= read -r extra_tag; do
              extra_tag="${extra_tag#"${extra_tag%%[![:space:]]*}"}"
              extra_tag="${extra_tag%"${extra_tag##*[![:space:]]}"}"
              if [[ -z "$extra_tag" ]]; then
                continue
              fi
              if [[ "$extra_tag" == *"/"* ]]; then
                echo "$extra_tag"
              else
                echo "${IMAGE}:${extra_tag}"
              fi
            done <<< "$EXTRA_TAGS"
            echo "TAGS"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve Docker build args @ VERSION=${{ inputs.version }}
        id: build-args
        env:
          VERSION: ${{ inputs.version }}
          BUILD_ARGS: ${{ inputs.build-args }}
        run: |
          {
            echo "value<<BUILD_ARGS"
            if [[ -n "$BUILD_ARGS" ]]; then
              printf '%s\n' "$BUILD_ARGS"
            fi
            if ! grep -Eq '(^|[[:space:]])VERSION=' <<< "$BUILD_ARGS"; then
              printf 'VERSION=%s\n' "$VERSION"
            fi
            echo "BUILD_ARGS"
          } >> "$GITHUB_OUTPUT"

      - name: Login to registry @ ${{ inputs.registry }}
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry-username || github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN || github.token }}
          logout: true

      - name: Publish image ${{ inputs.image }} @ ${{ inputs.platforms }}
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ inputs.labels }}
          build-args: ${{ steps.build-args.outputs.value }}
          cache-from: ${{ inputs.cache-from }}
          cache-to: ${{ inputs.cache-to }}
          sbom: ${{ inputs.sbom }}
          provenance: ${{ inputs.provenance }}

      - name: Write image metadata @ ${{ steps.build.outputs.digest || inputs.image }}
        id: manifest
        if: always()
        env:
          RETENTION_DAYS: ${{ inputs.artifact-retention-days }}
          DIGEST: ${{ steps.build.outputs.digest }}
          METADATA: ${{ steps.build.outputs.metadata }}
        run: |
          mkdir -p artifacts/container
          printf '%s\n' "$DIGEST" > artifacts/container/digest.txt
          printf '%s\n' "$METADATA" > artifacts/container/build-metadata.json
          cat > artifacts/artifact-manifest.json <<JSON
          {
            "schema": "ci-artifact-manifest/v1",
            "producer": {
              "repository": "${GITHUB_REPOSITORY}",
              "workflow": "wf-publish-container-dotnet",
              "run_id": "${GITHUB_RUN_ID}",
              "run_attempt": "${GITHUB_RUN_ATTEMPT}",
              "sha": "${GITHUB_SHA}",
              "job": "publish"
            },
            "artifacts": [
              {
                "name": "${GITHUB_REPOSITORY#*/}-container-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}",
                "kind": "image-metadata",
                "paths": ["artifacts/container"],
                "retention_days": ${RETENTION_DAYS}
              }
            ]
          }
          JSON
          echo "path=artifacts/artifact-manifest.json" >> "$GITHUB_OUTPUT"

      - name: Publish summary @ ${{ steps.build.outputs.digest || inputs.image }}
        if: always()
        env:
          IMAGE: ${{ inputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
          VERSION: ${{ inputs.version }}
          VERSION_CHANNEL: ${{ inputs.version-channel }}
          CHANNEL_LATEST: ${{ inputs.channel-latest }}
          EXTRA_TAGS: ${{ inputs.extra-tags }}
          SDK_VERSION: ${{ inputs.sdk-version }}
        run: |
          {
            echo "# .NET container publishing"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Runs on self-hosted | \`${{ inputs.runs-on-self-hosted }}\` |"
            echo "| Runner labels | \`${{ inputs.runs-on-json }}\` |"
            echo "| Image | \`${IMAGE}\` |"
            echo "| Environment | \`${{ inputs.environment-name }}\` |"
            echo "| Version | \`${VERSION}\` |"
            echo "| .NET SDK | \`${SDK_VERSION}\` |"
            echo "| Version channel | \`${VERSION_CHANNEL:-none}\` |"
            echo "| Channel latest | \`${CHANNEL_LATEST}\` |"
            echo "| Extra tags | \`${EXTRA_TAGS:-none}\` |"
            echo "| Digest | \`${DIGEST:-none}\` |"
            echo "| Manifest | \`${{ steps.manifest.outputs.path }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload container metadata @ ${{ github.event.repository.name }}-container-${{ github.run_id }}-${{ github.run_attempt }}
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-container-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts
          if-no-files-found: warn
          retention-days: ${{ inputs.artifact-retention-days }}
