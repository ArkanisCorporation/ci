# Summary:
#   Reusable GitHub Actions workflow lint.
# Remarks:
#   This workflow runs actionlint against the caller repository.
#   It validates workflow syntax, expressions, and common GitHub Actions mistakes before migration or release.
#   It requests read-only repository access.
#   It sets up Node.js because raven-actions/actionlint installs helper packages with npm on cold cache misses.
#   The enable-cache input controls the actionlint binary cache and is recorded in runner diagnostics.

name: wf-lint-github-actions

on:
  workflow_call:
    inputs:
      runs-on:
        description: Single runner label used when runs-on-json is empty.
        type: string
        required: false
        default: ubuntu-latest
      runs-on-json:
        description: JSON array passed to runs-on, including GitHub-hosted image labels or self-hosted runner labels. Overrides runs-on when set.
        type: string
        required: false
        default: ""
      runs-on-self-hosted:
        description: True when the effective runner selection targets self-hosted runners.
        type: boolean
        required: false
        default: false
      enable-cache:
        description: Enable the actionlint binary cache used by raven-actions/actionlint.
        type: boolean
        required: false
        default: true
      timeout-minutes:
        description: Workflow lint job timeout.
        type: number
        required: false
        default: 10

permissions: {}

jobs:
  lint:
    name: workflows @ ${{ github.head_ref || github.ref_name }}
    runs-on: ${{ fromJSON(inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest'))) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout caller @ ${{ github.repository }}:${{ github.head_ref || github.ref_name }}
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python 3.14 + pipx
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          pip-install: "pipx"

      - name: Set up Node.js 24 + npm
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          package-manager-cache: false

      - name: Validate runner contract @ ${{ inputs.runs-on-json || inputs.runs-on || 'ubuntu-latest' }}
        env:
          RUNS_ON_SELF_HOSTED: ${{ inputs.runs-on-self-hosted }}
          RUNS_ON_JSON: ${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}
          ENABLE_CACHE: ${{ inputs.enable-cache }}
        run: |
          mkdir -p artifacts/meta
          python_path="$(command -v python || true)"
          pipx_path="$(command -v pipx || true)"
          node_path="$(command -v node || true)"
          npm_path="$(command -v npm || true)"
          python_version="$([[ -n "$python_path" ]] && python --version 2>&1 || echo unavailable)"
          pipx_version="$([[ -n "$pipx_path" ]] && pipx --version 2>&1 || echo unavailable)"
          node_version="$([[ -n "$node_path" ]] && node --version 2>&1 || echo unavailable)"
          npm_version="$([[ -n "$npm_path" ]] && npm --version 2>&1 || echo unavailable)"

          {
            echo "Runs on self-hosted: ${RUNS_ON_SELF_HOSTED}"
            echo "Requested runner labels: ${RUNS_ON_JSON}"
            echo "Cache enabled: ${ENABLE_CACHE}"
            echo "Runner OS: ${RUNNER_OS}"
            echo "Runner arch: ${RUNNER_ARCH}"
            echo "Python path: ${python_path:-unavailable}"
            echo "Python version: ${python_version}"
            echo "pipx path: ${pipx_path:-unavailable}"
            echo "pipx version: ${pipx_version}"
            echo "Node path: ${node_path:-unavailable}"
            echo "Node version: ${node_version}"
            echo "npm path: ${npm_path:-unavailable}"
            echo "npm version: ${npm_version}"
          } | tee artifacts/meta/runner-contract.txt

      - name: Self-hosted preflight @ ${{ inputs.runs-on-json || inputs.runs-on || 'ubuntu-latest' }}
        if: inputs.runs-on-self-hosted
        run: |
          {
            echo "## Self-hosted runner preflight"
            echo
            df -h .
            echo
            command -v bash
            command -v git
            command -v node
            command -v npm
          } | tee artifacts/meta/self-hosted-preflight.txt

      - name: Actionlint @ caller workflows
        uses: raven-actions/actionlint@v2
        with:
          version: 1.7.12
          cache: ${{ inputs.enable-cache }}

      - name: Publish summary @ ${{ github.run_id }}
        if: always()
        run: |
          python_version="$(command -v python >/dev/null 2>&1 && python --version 2>&1 || echo unavailable)"
          pipx_version="$(command -v pipx >/dev/null 2>&1 && pipx --version 2>&1 || echo unavailable)"
          node_version="$(command -v node >/dev/null 2>&1 && node --version 2>&1 || echo unavailable)"
          npm_version="$(command -v npm >/dev/null 2>&1 && npm --version 2>&1 || echo unavailable)"

          {
            echo "# GitHub Actions lint"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Runs on self-hosted | \`${{ inputs.runs-on-self-hosted }}\` |"
            echo "| Runner labels | \`${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}\` |"
            echo "| Python | \`${python_version}\` |"
            echo "| pipx | \`${pipx_version}\` |"
            echo "| Node | \`${node_version}\` |"
            echo "| npm | \`${npm_version}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
