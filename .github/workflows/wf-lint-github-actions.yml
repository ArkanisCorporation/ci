# Summary:
#   Reusable GitHub Actions workflow lint.
# Remarks:
#   This workflow runs actionlint against the caller repository.
#   It validates workflow syntax, expressions, and common GitHub Actions mistakes before migration or release.
#   It requests read-only repository access and does not publish artifacts unless diagnostics are generated by actionlint.
#   The enable-cache input is reserved for future tool-cache integration and is recorded in runner diagnostics.

name: wf-lint-github-actions

on:
  workflow_call:
    inputs:
      runs-on-json:
        description: JSON array passed to runs-on, including GitHub-hosted image labels or self-hosted runner labels.
        type: string
        required: false
        default: '["ubuntu-latest"]'
      runs-on-self-hosted:
        description: True when runs-on-json targets self-hosted runners.
        type: boolean
        required: false
        default: false
      enable-cache:
        description: Reserved cache opt-out flag for future actionlint tool-cache integration.
        type: boolean
        required: false
        default: true
      timeout-minutes:
        description: Workflow lint job timeout.
        type: number
        required: false
        default: 10

permissions: {}

jobs:
  lint:
    name: workflows @ ${{ github.head_ref || github.ref_name }}
    runs-on: ${{ fromJSON(inputs.runs-on-json) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python and pipx
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          pip-install: "pipx"

      - name: Validate runner contract
        env:
          RUNS_ON_SELF_HOSTED: ${{ inputs.runs-on-self-hosted }}
          RUNS_ON_JSON: ${{ inputs.runs-on-json }}
          ENABLE_CACHE: ${{ inputs.enable-cache }}
        run: |
          mkdir -p artifacts/meta
          python_path="$(command -v python || true)"
          pipx_path="$(command -v pipx || true)"
          python_version="$([[ -n "$python_path" ]] && python --version 2>&1 || echo unavailable)"
          pipx_version="$([[ -n "$pipx_path" ]] && pipx --version 2>&1 || echo unavailable)"

          {
            echo "Runs on self-hosted: ${RUNS_ON_SELF_HOSTED}"
            echo "Requested runner labels: ${RUNS_ON_JSON}"
            echo "Cache enabled: ${ENABLE_CACHE}"
            echo "Runner OS: ${RUNNER_OS}"
            echo "Runner arch: ${RUNNER_ARCH}"
            echo "Python path: ${python_path:-unavailable}"
            echo "Python version: ${python_version}"
            echo "pipx path: ${pipx_path:-unavailable}"
            echo "pipx version: ${pipx_version}"
          } | tee artifacts/meta/runner-contract.txt

      - name: Self-hosted runner preflight
        if: inputs.runs-on-self-hosted
        run: |
          {
            echo "## Self-hosted runner preflight"
            echo
            df -h .
            echo
            command -v bash
            command -v git
          } | tee artifacts/meta/self-hosted-preflight.txt

      - name: Actionlint
        uses: raven-actions/actionlint@v2

      - name: Publish summary
        if: always()
        run: |
          python_version="$(command -v python >/dev/null 2>&1 && python --version 2>&1 || echo unavailable)"
          pipx_version="$(command -v pipx >/dev/null 2>&1 && pipx --version 2>&1 || echo unavailable)"

          {
            echo "# GitHub Actions lint"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Runs on self-hosted | \`${{ inputs.runs-on-self-hosted }}\` |"
            echo "| Runner labels | \`${{ inputs.runs-on-json }}\` |"
            echo "| Python | \`${python_version}\` |"
            echo "| pipx | \`${pipx_version}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
