# Summary:
#   Reusable Docker Buildx workflow for publishing OCI images.
# Remarks:
#   This workflow runs in the caller repository context.
#   It can use a remote BuildKit endpoint on self-hosted runners.
#   It can stamp .NET project versions before the image build when dotnet-setversion is true.
#   It forwards non-secret Docker build arguments to BuildKit.
#   If push is true, it logs into the configured registry and may create or overwrite mutable tags.
#   Consumers should deploy image digests from the digest output instead of mutable tags.

name: wf-publish-container

on:
  workflow_call:
    inputs:
      runs-on-json:
        description: JSON array passed to runs-on, including GitHub-hosted image labels or self-hosted runner labels.
        type: string
        required: false
        default: '["ubuntu-latest"]'
      runs-on-self-hosted:
        description: True when runs-on-json targets self-hosted runners.
        type: boolean
        required: false
        default: false
      image:
        description: Fully-qualified image name without tag.
        type: string
        required: true
      context:
        description: Docker build context.
        type: string
        required: false
        default: .
      dockerfile:
        description: Dockerfile path.
        type: string
        required: false
        default: Dockerfile
      platforms:
        description: Comma-delimited target platforms.
        type: string
        required: false
        default: linux/amd64
      version:
        description: Optional bare semantic version without leading v, used for .NET stamping and the VERSION Docker build argument.
        type: string
        required: false
        default: ""
      version-tag:
        description: Optional release version tag to apply to the image, usually prefixed with v.
        type: string
        required: false
        default: ""
      version-channel:
        description: Optional channel tag to apply.
        type: string
        required: false
        default: ""
      channel-latest:
        description: Adds a mutable <version-channel>-latest tag when version-channel is set.
        type: boolean
        required: false
        default: true
      latest-on-stable:
        description: Adds the mutable latest tag when version-channel is stable.
        type: boolean
        required: false
        default: false
      extra-tags:
        description: Optional newline-delimited extra image tags. Bare tags expand as image:tag; full image references pass through.
        type: string
        required: false
        default: ""
      push:
        description: Pushes image to registry when true.
        type: boolean
        required: false
        default: false
      registry:
        description: Registry host used for docker/login-action.
        type: string
        required: false
        default: ghcr.io
      registry-username:
        description: Registry username; defaults to github.actor when empty.
        type: string
        required: false
        default: ""
      buildkit-endpoint:
        description: Optional remote BuildKit endpoint for self-hosted runners.
        type: string
        required: false
        default: ""
      build-args:
        description: Optional newline-delimited Docker build arguments. Do not pass secrets here because Docker build args can persist in image metadata or logs.
        type: string
        required: false
        default: ""
      dotnet-setversion:
        description: Runs the dotnet-setversion action before Docker Buildx when true. Requires version to be a bare semantic version.
        type: boolean
        required: false
        default: false
      dotnet-version:
        description: .NET SDK version used by the dotnet-setversion action.
        type: string
        required: false
        default: 10.0.x
      dotnet-global-json-file:
        description: Optional global.json path passed to actions/setup-dotnet for version stamping.
        type: string
        required: false
        default: ""
      dotnet-setversion-working-directory:
        description: Working directory whose csproj files are stamped before Docker Buildx.
        type: string
        required: false
        default: .
      dotnet-setversion-recursive:
        description: Recursively stamps csproj files under dotnet-setversion-working-directory when true.
        type: boolean
        required: false
        default: true
      dotnet-setversion-project:
        description: Optional project path passed to setversion when recursive stamping is false.
        type: string
        required: false
        default: ""
      dotnet-setversion-tool-version:
        description: dotnet-setversion tool package version installed by the composite action.
        type: string
        required: false
        default: 4.0.0
      cache-from:
        description: Optional Docker Buildx cache-from value.
        type: string
        required: false
        default: ""
      cache-to:
        description: Optional Docker Buildx cache-to value.
        type: string
        required: false
        default: ""
      sbom:
        description: Docker Buildx sbom input.
        type: string
        required: false
        default: "true"
      provenance:
        description: Docker Buildx provenance input.
        type: string
        required: false
        default: mode=max
      labels:
        description: Optional newline-delimited OCI labels.
        type: string
        required: false
        default: ""
      timeout-minutes:
        description: Publish job timeout.
        type: number
        required: false
        default: 45
      artifact-retention-days:
        description: Metadata artifact retention in days.
        type: number
        required: false
        default: 30
    secrets:
      REGISTRY_TOKEN:
        description: Registry token; defaults to github.token when omitted.
        required: false
    outputs:
      digest:
        description: Image digest produced by docker/build-push-action.
        value: ${{ jobs.publish.outputs.digest }}
      metadata:
        description: Publish metadata JSON produced by docker/build-push-action.
        value: ${{ jobs.publish.outputs.metadata }}
      artifact-manifest:
        description: Path to the generated artifact manifest.
        value: ${{ jobs.publish.outputs.artifact-manifest }}

permissions: {}

jobs:
  publish:
    name: Container publish
    runs-on: ${{ fromJSON(inputs.runs-on-json) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      metadata: ${{ steps.build.outputs.metadata }}
      artifact-manifest: ${{ steps.manifest.outputs.path }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Validate runner contract
        env:
          RUNS_ON_SELF_HOSTED: ${{ inputs.runs-on-self-hosted }}
          RUNS_ON_JSON: ${{ inputs.runs-on-json }}
          BUILDKIT_ENDPOINT: ${{ inputs.buildkit-endpoint }}
          DOTNET_SETVERSION: ${{ inputs.dotnet-setversion }}
        run: |
          mkdir -p artifacts/container artifacts/meta
          {
            echo "Runs on self-hosted: ${RUNS_ON_SELF_HOSTED}"
            echo "Requested runner labels: ${RUNS_ON_JSON}"
            echo "Runner OS: ${RUNNER_OS}"
            echo "Runner arch: ${RUNNER_ARCH}"
            echo "Remote BuildKit endpoint configured: $([[ -n "$BUILDKIT_ENDPOINT" ]] && echo true || echo false)"
            echo "Dotnet setversion enabled: ${DOTNET_SETVERSION}"
          } | tee artifacts/meta/runner-contract.txt

      - name: Validate publish inputs
        env:
          VERSION: ${{ inputs.version }}
          DOTNET_SETVERSION: ${{ inputs.dotnet-setversion }}
          DOTNET_SETVERSION_PROJECT: ${{ inputs.dotnet-setversion-project }}
          DOTNET_SETVERSION_RECURSIVE: ${{ inputs.dotnet-setversion-recursive }}
        run: |
          if [[ -n "$VERSION" && "$VERSION" =~ ^[vV] ]]; then
            echo "version must be a bare semantic version without leading v. Use version-tag for Docker tags." >&2
            exit 2
          fi

          if [[ "$DOTNET_SETVERSION" == "true" && -z "$VERSION" ]]; then
            echo "version is required when dotnet-setversion is true." >&2
            exit 2
          fi

          if [[ "$DOTNET_SETVERSION_RECURSIVE" == "true" && -n "$DOTNET_SETVERSION_PROJECT" ]]; then
            echo "dotnet-setversion-project requires dotnet-setversion-recursive to be false." >&2
            exit 2
          fi

      - name: Self-hosted runner preflight
        if: inputs.runs-on-self-hosted
        run: |
          {
            echo "## Self-hosted runner preflight"
            echo
            df -h .
            echo
            command -v docker
            docker version
          } | tee artifacts/meta/self-hosted-preflight.txt

      - name: Set up Docker Buildx
        if: inputs.buildkit-endpoint == ''
        uses: docker/setup-buildx-action@v4

      - name: Set up remote Docker Buildx
        if: inputs.buildkit-endpoint != ''
        uses: docker/setup-buildx-action@v4
        with:
          driver: remote
          endpoint: ${{ inputs.buildkit-endpoint }}

      - name: Resolve platform action source
        id: platform-source
        if: inputs.dotnet-setversion
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          repository="${WORKFLOW_REF%%/.github/workflows/*}"
          if [[ -z "$repository" || "$repository" == "$WORKFLOW_REF" ]]; then
            echo "Could not resolve reusable workflow repository from github.workflow_ref: $WORKFLOW_REF" >&2
            exit 2
          fi

          echo "repository=$repository" >> "$GITHUB_OUTPUT"
          echo "ref=$WORKFLOW_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout platform action source
        if: inputs.dotnet-setversion
        uses: actions/checkout@v7
        with:
          repository: ${{ steps.platform-source.outputs.repository }}
          ref: ${{ steps.platform-source.outputs.ref }}
          path: .ci/arkanis-ci
          persist-credentials: false
          sparse-checkout: |
            .github/actions/dotnet-setversion
          sparse-checkout-cone-mode: false

      - name: Stamp .NET project versions
        if: inputs.dotnet-setversion
        uses: ./.ci/arkanis-ci/.github/actions/dotnet-setversion
        with:
          version: ${{ inputs.version }}
          working-directory: ${{ inputs.dotnet-setversion-working-directory }}
          dotnet-version: ${{ inputs.dotnet-version }}
          global-json-file: ${{ inputs.dotnet-global-json-file }}
          recursive: ${{ inputs.dotnet-setversion-recursive }}
          project: ${{ inputs.dotnet-setversion-project }}
          tool-version: ${{ inputs.dotnet-setversion-tool-version }}

      - name: Remove platform action source
        if: always() && inputs.dotnet-setversion
        run: rm -rf .ci/arkanis-ci

      - name: Resolve image tags
        id: tags
        env:
          IMAGE: ${{ inputs.image }}
          VERSION_TAG: ${{ inputs.version-tag }}
          VERSION_CHANNEL: ${{ inputs.version-channel }}
          CHANNEL_LATEST: ${{ inputs.channel-latest }}
          LATEST_ON_STABLE: ${{ inputs.latest-on-stable }}
          EXTRA_TAGS: ${{ inputs.extra-tags }}
        run: |
          short_sha="${GITHUB_SHA::12}"
          {
            echo "tags<<TAGS"
            echo "${IMAGE}:sha-${short_sha}"
            if [[ -n "$VERSION_TAG" ]]; then
              echo "${IMAGE}:${VERSION_TAG}"
            fi
            if [[ -n "$VERSION_CHANNEL" ]]; then
              echo "${IMAGE}:${VERSION_CHANNEL}"
              if [[ "$CHANNEL_LATEST" == "true" ]]; then
                echo "${IMAGE}:${VERSION_CHANNEL}-latest"
              fi
              if [[ "$LATEST_ON_STABLE" == "true" && "$VERSION_CHANNEL" == "stable" ]]; then
                echo "${IMAGE}:latest"
              fi
            fi
            while IFS= read -r extra_tag; do
              extra_tag="${extra_tag#"${extra_tag%%[![:space:]]*}"}"
              extra_tag="${extra_tag%"${extra_tag##*[![:space:]]}"}"
              if [[ -z "$extra_tag" ]]; then
                continue
              fi
              if [[ "$extra_tag" == *"/"* ]]; then
                echo "$extra_tag"
              else
                echo "${IMAGE}:${extra_tag}"
              fi
            done <<< "$EXTRA_TAGS"
            echo "TAGS"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve Docker build arguments
        id: build-args
        env:
          VERSION: ${{ inputs.version }}
          BUILD_ARGS: ${{ inputs.build-args }}
        run: |
          {
            echo "value<<BUILD_ARGS"
            if [[ -n "$BUILD_ARGS" ]]; then
              printf '%s\n' "$BUILD_ARGS"
            fi
            if [[ -n "$VERSION" ]] && ! grep -Eq '(^|[[:space:]])VERSION=' <<< "$BUILD_ARGS"; then
              printf 'VERSION=%s\n' "$VERSION"
            fi
            echo "BUILD_ARGS"
          } >> "$GITHUB_OUTPUT"

      - name: Login to registry
        if: inputs.push
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry-username || github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN || github.token }}
          logout: true

      - name: Publish image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ inputs.labels }}
          build-args: ${{ steps.build-args.outputs.value }}
          cache-from: ${{ inputs.cache-from }}
          cache-to: ${{ inputs.cache-to }}
          sbom: ${{ inputs.sbom }}
          provenance: ${{ inputs.provenance }}

      - name: Write image metadata
        id: manifest
        if: always()
        env:
          RETENTION_DAYS: ${{ inputs.artifact-retention-days }}
          DIGEST: ${{ steps.build.outputs.digest }}
          METADATA: ${{ steps.build.outputs.metadata }}
        run: |
          mkdir -p artifacts/container
          printf '%s\n' "$DIGEST" > artifacts/container/digest.txt
          printf '%s\n' "$METADATA" > artifacts/container/build-metadata.json
          cat > artifacts/artifact-manifest.json <<JSON
          {
            "schema": "ci-artifact-manifest/v1",
            "producer": {
              "repository": "${GITHUB_REPOSITORY}",
              "workflow": "wf-publish-container",
              "run_id": "${GITHUB_RUN_ID}",
              "run_attempt": "${GITHUB_RUN_ATTEMPT}",
              "sha": "${GITHUB_SHA}",
              "job": "publish"
            },
            "artifacts": [
              {
                "name": "${GITHUB_REPOSITORY#*/}-container-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}",
                "kind": "image-metadata",
                "paths": ["artifacts/container"],
                "retention_days": ${RETENTION_DAYS}
              }
            ]
          }
          JSON
          echo "path=artifacts/artifact-manifest.json" >> "$GITHUB_OUTPUT"

      - name: Publish summary
        if: always()
        env:
          IMAGE: ${{ inputs.image }}
          PUSH: ${{ inputs.push }}
          DIGEST: ${{ steps.build.outputs.digest }}
          VERSION: ${{ inputs.version }}
          VERSION_CHANNEL: ${{ inputs.version-channel }}
          CHANNEL_LATEST: ${{ inputs.channel-latest }}
          EXTRA_TAGS: ${{ inputs.extra-tags }}
          DOTNET_SETVERSION: ${{ inputs.dotnet-setversion }}
        run: |
          {
            echo "# Container publishing"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Runs on self-hosted | \`${{ inputs.runs-on-self-hosted }}\` |"
            echo "| Runner labels | \`${{ inputs.runs-on-json }}\` |"
            echo "| Image | \`${IMAGE}\` |"
            echo "| Version | \`${VERSION:-none}\` |"
            echo "| Version channel | \`${VERSION_CHANNEL:-none}\` |"
            echo "| Channel latest | \`${CHANNEL_LATEST}\` |"
            echo "| Extra tags | \`${EXTRA_TAGS:-none}\` |"
            echo "| Dotnet setversion | \`${DOTNET_SETVERSION}\` |"
            echo "| Push | \`${PUSH}\` |"
            echo "| Digest | \`${DIGEST:-none}\` |"
            echo "| Manifest | \`${{ steps.manifest.outputs.path }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload container metadata
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-container-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts
          if-no-files-found: warn
          retention-days: ${{ inputs.artifact-retention-days }}
