# Summary:
#   Reusable .NET formatting and JetBrains CleanupCode verification workflow.
# Remarks:
#   This workflow restores dependencies, optionally runs dotnet format verification, then runs JetBrains CleanupCode verification.
#   It does not build, test, publish, or deploy.

name: wf-dotnet-format

on:
  workflow_call:
    inputs:
      runs-on:
        description: Single runner label used when runs-on-json is empty.
        type: string
        required: false
        default: ubuntu-latest
      runs-on-json:
        description: JSON array passed to runs-on, including GitHub-hosted image labels or self-hosted runner labels. Overrides runs-on when set.
        type: string
        required: false
        default: ""
      runs-on-self-hosted:
        description: True when the effective runner selection targets self-hosted runners.
        type: boolean
        required: false
        default: false
      dotnet-version:
        description: .NET SDK version range used when global-json-file is empty.
        type: string
        required: false
        default: 10.0.x
      global-json-file:
        description: Optional global.json path used by actions/setup-dotnet.
        type: string
        required: false
        default: ""
      solution:
        description: Solution or project path to restore, format, and pass to CleanupCode.
        type: string
        required: true
      working-directory:
        description: Directory where restore, dotnet format, CleanupCode, and Git diff checks run.
        type: string
        required: false
        default: .
      restore-locked-mode:
        description: Runs dotnet restore with --locked-mode.
        type: boolean
        required: false
        default: true
      run-dotnet-format:
        description: Runs dotnet format before mandatory JetBrains CleanupCode verification.
        type: boolean
        required: false
        default: true
      enable-cache:
        description: Restores and saves NuGet dependency cache with runs-on/cache when true. Set false for cold-format validation or runners without cache service access.
        type: boolean
        required: false
        default: true
      profile:
        description: CleanupCode profile name.
        type: string
        required: false
        default: "Built-in: Reformat & Apply Syntax Style"
      include:
        description: Optional semicolon-delimited CleanupCode include filter.
        type: string
        required: false
        default: ""
      exclude:
        description: Optional semicolon-delimited CleanupCode exclude filter.
        type: string
        required: false
        default: "**/*.razor;**/*.svg;**/*.md"
      no-updates:
        description: Passes --no-updates to CleanupCode when true.
        type: boolean
        required: false
        default: true
      restore-tools:
        description: Restores local .NET tools during shared setup.
        type: boolean
        required: false
        default: true
      install-tool:
        description: Installs JetBrains.ReSharper.GlobalTools into RUNNER_TEMP instead of using a local tool manifest.
        type: boolean
        required: false
        default: false
      tool-version:
        description: Optional JetBrains.ReSharper.GlobalTools version used when install-tool is true.
        type: string
        required: false
        default: ""
      fail-on-diff:
        description: Fails the workflow when CleanupCode creates a Git diff.
        type: boolean
        required: false
        default: true
      remediation-message:
        description: Message written to the step summary when CleanupCode creates a diff.
        type: string
        required: false
        default: "Run `dotnet husky run --name dotnet-cleanupcode` locally and commit the resulting changes."
      artifact-retention-days:
        description: Diagnostic artifact retention in days.
        type: number
        required: false
        default: 14
      timeout-minutes:
        description: Format job timeout.
        type: number
        required: false
        default: 20
    outputs:
      artifact-manifest:
        description: Path to the generated artifact manifest.
        value: ${{ jobs.format.outputs.artifact-manifest }}
      run-metadata:
        description: Path to the generated run metadata.
        value: ${{ jobs.format.outputs.run-metadata }}

permissions: {}

env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  format:
    name: ${{ inputs.solution }} @ ${{ github.head_ref || github.ref_name }}
    runs-on: ${{ fromJSON(inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest'))) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    outputs:
      artifact-manifest: ${{ steps.manifest.outputs.path }}
      run-metadata: ${{ steps.metadata.outputs.path }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout caller @ ${{ github.repository }}:${{ github.head_ref || github.ref_name }}
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup .NET action tooling @ 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Checkout platform actions @ ${{ fromJSON(toJSON(job)).workflow_repository }}:${{ fromJSON(toJSON(job)).workflow_sha }}
        uses: actions/checkout@v7
        with:
          # fromJSON(toJSON(job)) is only there because our pinned actionlint:1.7.12 does not know the newer documented job.workflow_ref / job.workflow_sha fields.
          repository: ${{ fromJSON(toJSON(job)).workflow_repository }}
          ref: ${{ fromJSON(toJSON(job)).workflow_sha }}
          path: .ci/arkanis-ci
          persist-credentials: false
          sparse-checkout: |
            .github/actions/setup-dotnet
            .github/actions/dotnet-jetbrains-cleanupcode
          sparse-checkout-cone-mode: false

      - name: Setup .NET @ ${{ inputs.global-json-file || inputs.dotnet-version }}
        id: setup-dotnet
        uses: ./.ci/arkanis-ci/.github/actions/setup-dotnet
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          global-json-file: ${{ inputs.global-json-file }}
          runs-on: ${{ inputs.runs-on }}
          runs-on-json: ${{ inputs.runs-on-json }}
          runs-on-self-hosted: ${{ inputs.runs-on-self-hosted }}
          enable-cache: ${{ inputs.enable-cache }}
          nuget-packages: ${{ env.NUGET_PACKAGES }}
          restore-tools: ${{ inputs.restore-tools }}
          working-directory: ${{ inputs.working-directory }}
          solution: ${{ inputs.solution }}
          restore-locked-mode: ${{ inputs.restore-locked-mode }}

      - name: Verify formatting @ ${{ inputs.solution }}
        id: dotnet-format
        if: inputs.run-dotnet-format
        continue-on-error: true
        env:
          SOLUTION: ${{ inputs.solution }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: |
          cd "$WORKING_DIRECTORY"
          dotnet format "$SOLUTION" --verify-no-changes --verbosity diagnostic --no-restore

      - name: Verify JetBrains CleanupCode @ ${{ inputs.profile }}
        id: cleanupcode
        uses: ./.ci/arkanis-ci/.github/actions/dotnet-jetbrains-cleanupcode
        with:
          solution: ${{ inputs.solution }}
          working-directory: ${{ inputs.working-directory }}
          profile: ${{ inputs.profile }}
          include: ${{ inputs.include }}
          exclude: ${{ inputs.exclude }}
          no-updates: ${{ inputs.no-updates }}
          restore-tools: "false"
          install-tool: ${{ inputs.install-tool }}
          tool-version: ${{ inputs.tool-version }}
          fail-on-diff: ${{ inputs.fail-on-diff }}
          remediation-message: ${{ inputs.remediation-message }}
          artifacts-path: ${{ github.workspace }}/artifacts/jetbrains-cleanupcode

      - name: Write run metadata @ artifacts/meta/run-metadata.json
        id: metadata
        if: always()
        env:
          RUNS_ON_JSON: ${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}
          TOOL_VERSIONS_JSON: ${{ steps.setup-dotnet.outputs.tool-versions-json || '{}' }}
        run: |
          mkdir -p artifacts/meta
          cat > artifacts/meta/run-metadata.json <<JSON
          {
            "schema": "run-metadata/v1",
            "repository": "${GITHUB_REPOSITORY}",
            "workflow": "wf-dotnet-format",
            "sha": "${GITHUB_SHA}",
            "ref": "${GITHUB_REF}",
            "event_name": "${GITHUB_EVENT_NAME}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "runner": {
              "os": "${RUNNER_OS}",
              "arch": "${RUNNER_ARCH}",
              "labels": ${RUNS_ON_JSON}
            },
            "tool_versions": ${TOOL_VERSIONS_JSON}
          }
          JSON
          echo "path=artifacts/meta/run-metadata.json" >> "$GITHUB_OUTPUT"

      - name: Write artifact manifest @ artifacts/artifact-manifest.json
        id: manifest
        if: always()
        env:
          RETENTION_DAYS: ${{ inputs.artifact-retention-days }}
        run: |
          mkdir -p artifacts
          cat > artifacts/artifact-manifest.json <<JSON
          {
            "schema": "ci-artifact-manifest/v1",
            "producer": {
              "repository": "${GITHUB_REPOSITORY}",
              "workflow": "wf-dotnet-format",
              "run_id": "${GITHUB_RUN_ID}",
              "run_attempt": "${GITHUB_RUN_ATTEMPT}",
              "sha": "${GITHUB_SHA}",
              "job": "format"
            },
            "artifacts": [
              {
                "name": "${GITHUB_REPOSITORY#*/}-dotnet-format-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}",
                "kind": "diagnostics",
                "paths": ["artifacts"],
                "retention_days": ${RETENTION_DAYS}
              }
            ]
          }
          JSON
          echo "path=artifacts/artifact-manifest.json" >> "$GITHUB_OUTPUT"

      - name: Publish summary @ ${{ steps.manifest.outputs.path || github.run_id }}
        if: always()
        env:
          SOLUTION: ${{ inputs.solution }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          PROFILE: ${{ inputs.profile }}
          EXCLUDE: ${{ inputs.exclude }}
          FAIL_ON_DIFF: ${{ inputs.fail-on-diff }}
        run: |
          {
            echo "# .NET format"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Runs on self-hosted | \`${{ inputs.runs-on-self-hosted }}\` |"
            echo "| Runner labels | \`${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}\` |"
            echo "| Solution | \`${SOLUTION}\` |"
            echo "| Working directory | \`${WORKING_DIRECTORY}\` |"
            echo "| dotnet format | \`${{ inputs.run-dotnet-format }}\` |"
            echo "| dotnet format outcome | \`${{ steps.dotnet-format.outcome || 'skipped' }}\` |"
            echo "| CleanupCode profile | \`${PROFILE}\` |"
            echo "| CleanupCode exclude | \`${EXCLUDE}\` |"
            echo "| CleanupCode fail on diff | \`${FAIL_ON_DIFF}\` |"
            echo "| CleanupCode diff found | \`${{ steps.cleanupcode.outputs.diff-found || 'unknown' }}\` |"
            echo "| CleanupCode changed files | \`${{ steps.cleanupcode.outputs.changed-files || '' }}\` |"
            echo "| Restore locked mode | \`${{ inputs.restore-locked-mode }}\` |"
            echo "| Cache enabled | \`${{ inputs.enable-cache }}\` |"
            echo "| Artifact manifest | \`${{ steps.manifest.outputs.path }}\` |"
            echo "| Run metadata | \`${{ steps.metadata.outputs.path }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload diagnostics @ ${{ github.event.repository.name }}-dotnet-format-${{ github.run_id }}-${{ github.run_attempt }}
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-dotnet-format-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts
          if-no-files-found: warn
          retention-days: ${{ inputs.artifact-retention-days }}
