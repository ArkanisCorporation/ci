# Summary:
#   Reusable production NuGet pack and publish workflow.
# Remarks:
#   This workflow builds packages from a project path, then publishes them from an environment-gated job.
#   It supports NuGet Trusted Publishing through NuGet/login or long-lived API-key fallback for legacy feeds.
#   Use wf-verify-publish-nuget.yml for package verification without environments, secrets, id-token, or publication.
#   Trusted Publishing requires the nuget.org policy to match the workflow that requests the OIDC token.
#   It stamps .NET project versions with dotnet-setversion by default before packing.
#   It calls runs-on/cache only when enable-cache is true.

name: wf-publish-nuget

on:
  workflow_call:
    inputs:
      runs-on:
        description: Single runner label used when runs-on-json is empty.
        type: string
        required: false
        default: ubuntu-latest
      runs-on-json:
        description: JSON array passed to runs-on, including GitHub-hosted image labels or self-hosted runner labels. Overrides runs-on when set.
        type: string
        required: false
        default: ""
      runs-on-self-hosted:
        description: True when the effective runner selection targets self-hosted runners.
        type: boolean
        required: false
        default: false
      environment-name:
        description: GitHub environment guarding package publication.
        type: string
        required: false
        default: nuget
      project:
        description: Project path passed to dotnet restore and dotnet pack.
        type: string
        required: true
      version:
        description: PackageVersion value passed to dotnet pack.
        type: string
        required: true
      dotnet-version:
        description: .NET SDK version used for setup and version stamping.
        type: string
        required: false
        default: 10.0.x
      global-json-file:
        description: Optional global.json path passed to actions/setup-dotnet and dotnet-setversion.
        type: string
        required: false
        default: ""
      configuration:
        description: Build configuration.
        type: string
        required: false
        default: Release
      enable-cache:
        description: Restores and saves NuGet dependency cache with runs-on/cache when true. Set false for cold-pack validation or runners without cache service access.
        type: boolean
        required: false
        default: true
      source:
        description: NuGet package source.
        type: string
        required: false
        default: https://api.nuget.org/v3/index.json
      trusted-publishing:
        description: Uses NuGet/login OIDC flow instead of NUGET_API_KEY.
        type: boolean
        required: false
        default: true
      nuget-user:
        description: NuGet profile or organization name used by NuGet/login. Falls back to the caller NUGET_USER secret, then configuration variable, when empty.
        type: string
        required: false
        default: ""
      skip-duplicate:
        description: Adds --skip-duplicate to dotnet nuget push.
        type: boolean
        required: false
        default: true
      include-symbols:
        description: Creates a .snupkg with dotnet pack --include-symbols and SymbolPackageFormat=snupkg.
        type: boolean
        required: false
        default: true
      include-source:
        description: Passes --include-source to dotnet pack when true.
        type: boolean
        required: false
        default: true
      dotnet-setversion:
        description: Runs the dotnet-setversion action before dotnet pack when true. Requires version to be a bare semantic version.
        type: boolean
        required: false
        default: true
      dotnet-setversion-working-directory:
        description: Working directory whose csproj files are stamped before dotnet pack.
        type: string
        required: false
        default: .
      dotnet-setversion-recursive:
        description: Recursively stamps csproj files under dotnet-setversion-working-directory when true.
        type: boolean
        required: false
        default: true
      dotnet-setversion-project:
        description: Optional project path passed to setversion when recursive stamping is false.
        type: string
        required: false
        default: ""
      dotnet-setversion-tool-version:
        description: dotnet-setversion tool package version installed by the composite action.
        type: string
        required: false
        default: 4.0.0
      timeout-minutes:
        description: Publish workflow job timeout.
        type: number
        required: false
        default: 30
      artifact-retention-days:
        description: Package artifact retention in days.
        type: number
        required: false
        default: 30
    secrets:
      NUGET_API_KEY:
        description: Long-lived NuGet API key used only when trusted-publishing is false.
        required: false
      NUGET_USER:
        description: NuGet profile or organization name used by NuGet/login when trusted-publishing is true.
        required: false
    outputs:
      artifact-manifest:
        description: Path to the generated artifact manifest.
        value: ${{ jobs.pack.outputs.artifact-manifest }}

permissions: {}

env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  pack:
    name: ${{ inputs.version }} @ pack
    runs-on: ${{ fromJSON(inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest'))) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    outputs:
      artifact-manifest: ${{ steps.manifest.outputs.path }}
      package-artifact-name: ${{ steps.package-artifact.outputs.name }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout caller @ ${{ github.repository }}:${{ github.head_ref || github.ref_name }}
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup .NET @ ${{ inputs.global-json-file || inputs.dotnet-version }}
        id: setup-dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          global-json-file: ${{ inputs.global-json-file }}

      - name: Cache NuGet packages @ ${{ runner.os }}-${{ runner.arch }}
        if: inputs.enable-cache
        uses: runs-on/cache@v5.0.7
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '.config/dotnet-tools.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Validate runner contract @ ${{ inputs.runs-on-json || inputs.runs-on || 'ubuntu-latest' }}
        env:
          RUNS_ON_SELF_HOSTED: ${{ inputs.runs-on-self-hosted }}
          RUNS_ON_JSON: ${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}
          ENABLE_CACHE: ${{ inputs.enable-cache }}
          DOTNET_SETVERSION: ${{ inputs.dotnet-setversion }}
        run: |
          mkdir -p artifacts/meta
          {
            echo "Runs on self-hosted: ${RUNS_ON_SELF_HOSTED}"
            echo "Requested runner labels: ${RUNS_ON_JSON}"
            echo "NuGet cache enabled: ${ENABLE_CACHE}"
            echo "Dotnet setversion enabled: ${DOTNET_SETVERSION}"
            echo "Runner OS: ${RUNNER_OS}"
            echo "Runner arch: ${RUNNER_ARCH}"
            dotnet --info
          } | tee artifacts/meta/runner-contract.txt

      - name: Self-hosted preflight @ ${{ inputs.runs-on-json || inputs.runs-on || 'ubuntu-latest' }}
        if: inputs.runs-on-self-hosted
        run: |
          {
            echo "## Self-hosted runner preflight"
            echo
            df -h .
            echo
            command -v dotnet
            command -v git
          } | tee artifacts/meta/self-hosted-preflight.txt

      - name: Validate package inputs @ ${{ inputs.project }} ${{ inputs.version }}
        env:
          VERSION: ${{ inputs.version }}
          DOTNET_SETVERSION: ${{ inputs.dotnet-setversion }}
          DOTNET_SETVERSION_PROJECT: ${{ inputs.dotnet-setversion-project }}
          DOTNET_SETVERSION_RECURSIVE: ${{ inputs.dotnet-setversion-recursive }}
        run: |
          if [[ -n "$VERSION" && "$VERSION" =~ ^[vV] ]]; then
            echo "version must be a bare semantic version without leading v." >&2
            exit 2
          fi

          if [[ "$DOTNET_SETVERSION" == "true" && -z "$VERSION" ]]; then
            echo "version is required when dotnet-setversion is true." >&2
            exit 2
          fi

          if [[ "$DOTNET_SETVERSION_RECURSIVE" == "true" && -n "$DOTNET_SETVERSION_PROJECT" ]]; then
            echo "dotnet-setversion-project requires dotnet-setversion-recursive to be false." >&2
            exit 2
          fi

      - name: Restore package project @ ${{ inputs.project }}
        env:
          PROJECT: ${{ inputs.project }}
        run: dotnet restore "$PROJECT" --locked-mode

      - name: Checkout platform action @ ${{ fromJSON(toJSON(job)).workflow_repository }}:${{ fromJSON(toJSON(job)).workflow_sha }}
        if: inputs.dotnet-setversion
        uses: actions/checkout@v7
        with:
          # fromJSON(toJSON(job)) is only there because our pinned actionlint:1.7.12 does not know the newer documented job.workflow_ref / job.workflow_sha fields.
          repository: ${{ fromJSON(toJSON(job)).workflow_repository }}
          ref: ${{ fromJSON(toJSON(job)).workflow_sha }}
          path: .ci/arkanis-ci
          persist-credentials: false
          sparse-checkout: |
            .github/actions/dotnet-setversion
          sparse-checkout-cone-mode: false

      - name: Stamp .NET projects @ ${{ inputs.version }}
        if: inputs.dotnet-setversion
        uses: ./.ci/arkanis-ci/.github/actions/dotnet-setversion
        with:
          version: ${{ inputs.version }}
          working-directory: ${{ inputs.dotnet-setversion-working-directory }}
          dotnet-version: ${{ inputs.dotnet-version }}
          global-json-file: ${{ inputs.global-json-file }}
          recursive: ${{ inputs.dotnet-setversion-recursive }}
          project: ${{ inputs.dotnet-setversion-project }}
          tool-version: ${{ inputs.dotnet-setversion-tool-version }}

      - name: Pack ${{ inputs.project }} @ ${{ inputs.version }}
        env:
          PROJECT: ${{ inputs.project }}
          VERSION: ${{ inputs.version }}
          CONFIGURATION: ${{ inputs.configuration }}
          INCLUDE_SYMBOLS: ${{ inputs.include-symbols }}
          INCLUDE_SOURCE: ${{ inputs.include-source }}
        run: |
          mkdir -p artifacts/nuget
          pack_args=(
            dotnet pack "$PROJECT"
            --configuration "$CONFIGURATION"
            --no-restore
            --output artifacts/nuget
            -p:PackageVersion="$VERSION"
            -p:ContinuousIntegrationBuild=true
          )

          if [[ "$INCLUDE_SYMBOLS" == "true" ]]; then
            pack_args+=(--include-symbols -p:SymbolPackageFormat=snupkg)
          fi

          if [[ "$INCLUDE_SOURCE" == "true" ]]; then
            pack_args+=(--include-source)
          fi

          "${pack_args[@]}"

      - name: Verify package output @ artifacts/nuget
        run: |
          shopt -s nullglob
          packages=(artifacts/nuget/*.nupkg)
          if [[ "${#packages[@]}" -eq 0 ]]; then
            echo "dotnet pack produced no .nupkg files." >&2
            exit 1
          fi
          printf '%s\n' "${packages[@]}" | tee artifacts/nuget/package-list.txt

      - name: Write artifact manifest @ artifacts/artifact-manifest.json
        id: manifest
        if: always()
        env:
          RETENTION_DAYS: ${{ inputs.artifact-retention-days }}
        run: |
          cat > artifacts/artifact-manifest.json <<JSON
          {
            "schema": "ci-artifact-manifest/v1",
            "producer": {
              "repository": "${GITHUB_REPOSITORY}",
              "workflow": "wf-publish-nuget",
              "run_id": "${GITHUB_RUN_ID}",
              "run_attempt": "${GITHUB_RUN_ATTEMPT}",
              "sha": "${GITHUB_SHA}",
              "job": "pack"
            },
            "artifacts": [
              {
                "name": "${GITHUB_REPOSITORY#*/}-nuget-${{ inputs.version }}",
                "kind": "package",
                "paths": ["artifacts/nuget"],
                "retention_days": ${RETENTION_DAYS}
              }
            ]
          }
          JSON
          echo "path=artifacts/artifact-manifest.json" >> "$GITHUB_OUTPUT"

      - name: Resolve package artifact @ ${{ inputs.version }}
        id: package-artifact
        run: echo "name=${GITHUB_REPOSITORY#*/}-nuget-${{ inputs.version }}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Publish summary @ ${{ steps.manifest.outputs.path || github.run_id }}
        if: always()
        env:
          PROJECT: ${{ inputs.project }}
          VERSION: ${{ inputs.version }}
          TRUSTED_PUBLISHING: ${{ inputs.trusted-publishing }}
          SOURCE: ${{ inputs.source }}
          INCLUDE_SYMBOLS: ${{ inputs.include-symbols }}
          INCLUDE_SOURCE: ${{ inputs.include-source }}
          DOTNET_SETVERSION: ${{ inputs.dotnet-setversion }}
        run: |
          {
            echo "# NuGet package publish preparation"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Runs on self-hosted | \`${{ inputs.runs-on-self-hosted }}\` |"
            echo "| Runner labels | \`${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}\` |"
            echo "| Project | \`${PROJECT}\` |"
            echo "| Version | \`${VERSION}\` |"
            echo "| Publish environment | \`${{ inputs.environment-name }}\` |"
            echo "| Trusted publishing | \`${TRUSTED_PUBLISHING}\` |"
            echo "| Include symbols | \`${INCLUDE_SYMBOLS}\` |"
            echo "| Include source | \`${INCLUDE_SOURCE}\` |"
            echo "| Dotnet setversion | \`${DOTNET_SETVERSION}\` |"
            echo "| Source | \`${SOURCE}\` |"
            echo "| Manifest | \`${{ steps.manifest.outputs.path }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload package artifacts @ ${{ steps.package-artifact.outputs.name }}
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package-artifact.outputs.name }}
          path: artifacts
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention-days }}

  publish-trusted:
    name: ${{ inputs.version }} @ ${{ inputs.environment-name }}
    if: inputs.trusted-publishing
    needs: pack
    runs-on: ${{ fromJSON(inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest'))) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    environment: ${{ inputs.environment-name }}
    concurrency:
      group: publish-nuget-${{ inputs.environment-name }}-${{ inputs.project }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Validate trusted publishing inputs @ ${{ inputs.nuget-user || (secrets.NUGET_USER != '' && 'NUGET_USER secret') || vars.NUGET_USER }}
        env:
          NUGET_USER: ${{ inputs.nuget-user || secrets.NUGET_USER || vars.NUGET_USER }}
        run: |
          if [[ -z "$NUGET_USER" ]]; then
            echo "nuget-user is required when trusted-publishing is true." >&2
            exit 2
          fi

      - name: NuGet Trusted Publishing login @ ${{ inputs.nuget-user || (secrets.NUGET_USER != '' && 'NUGET_USER secret') || vars.NUGET_USER }}
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ inputs.nuget-user || secrets.NUGET_USER || vars.NUGET_USER }}

      - name: Download package artifacts @ ${{ needs.pack.outputs.package-artifact-name }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.pack.outputs.package-artifact-name }}
          path: artifacts

      - name: Publish packages via Trusted Publishing @ ${{ inputs.source }}
        env:
          API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          SOURCE: ${{ inputs.source }}
          SKIP_DUPLICATE: ${{ inputs.skip-duplicate }}
        run: |
          shopt -s nullglob
          push_args=()
          if [[ "$SKIP_DUPLICATE" == "true" ]]; then
            push_args+=(--skip-duplicate)
          fi
          for package in artifacts/nuget/*.nupkg; do
            dotnet nuget push "$package" --api-key "$API_KEY" --source "$SOURCE" "${push_args[@]}"
          done

      - name: Publish summary @ ${{ needs.pack.outputs.package-artifact-name }}
        if: always()
        run: |
          {
            echo "# NuGet Trusted Publishing"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Environment | \`${{ inputs.environment-name }}\` |"
            echo "| Source | \`${{ inputs.source }}\` |"
            echo "| Artifact | \`${{ needs.pack.outputs.package-artifact-name }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-api-key:
    name: ${{ inputs.version }} @ ${{ inputs.environment-name }}
    if: ${{ !inputs.trusted-publishing }}
    needs: pack
    runs-on: ${{ fromJSON(inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest'))) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    environment: ${{ inputs.environment-name }}
    concurrency:
      group: publish-nuget-${{ inputs.environment-name }}-${{ inputs.project }}
      cancel-in-progress: false
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Validate API key publishing inputs @ ${{ inputs.source }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [[ -z "$NUGET_API_KEY" ]]; then
            echo "NUGET_API_KEY secret is required when trusted-publishing is false." >&2
            exit 2
          fi

      - name: Download package artifacts @ ${{ needs.pack.outputs.package-artifact-name }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.pack.outputs.package-artifact-name }}
          path: artifacts

      - name: Publish packages via API key @ ${{ inputs.source }}
        env:
          API_KEY: ${{ secrets.NUGET_API_KEY }}
          SOURCE: ${{ inputs.source }}
          SKIP_DUPLICATE: ${{ inputs.skip-duplicate }}
        run: |
          shopt -s nullglob
          push_args=()
          if [[ "$SKIP_DUPLICATE" == "true" ]]; then
            push_args+=(--skip-duplicate)
          fi
          for package in artifacts/nuget/*.nupkg; do
            dotnet nuget push "$package" --api-key "$API_KEY" --source "$SOURCE" "${push_args[@]}"
          done

      - name: Publish summary @ ${{ needs.pack.outputs.package-artifact-name }}
        if: always()
        run: |
          {
            echo "# NuGet API-key publishing"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Environment | \`${{ inputs.environment-name }}\` |"
            echo "| Source | \`${{ inputs.source }}\` |"
            echo "| Artifact | \`${{ needs.pack.outputs.package-artifact-name }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
