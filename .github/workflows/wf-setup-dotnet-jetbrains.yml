# Summary:
#   Reusable .NET JetBrains CleanupCode verification workflow.
# Remarks:
#   This workflow runs in the caller repository context.
#   It restores .NET dependencies, restores or installs JetBrains ReSharper command line tools, runs CleanupCode, and fails when CleanupCode creates a Git diff.
#   Defaults mirror CitizenId CI: profile `Built-in: Reformat & Apply Syntax Style`, exclude Razor, SVG, and Markdown files, and pass `--no-updates`.
#   It writes diagnostics under `artifacts/jetbrains-cleanupcode` and uploads them even on failure.

name: wf-setup-dotnet-jetbrains

on:
  workflow_call:
    inputs:
      runs-on:
        description: Single runner label used when runs-on-json is empty.
        type: string
        required: false
        default: ubuntu-latest
      runs-on-json:
        description: JSON array passed to runs-on, including GitHub-hosted image labels or self-hosted runner labels. Overrides runs-on when set.
        type: string
        required: false
        default: ""
      runs-on-self-hosted:
        description: True when the effective runner selection targets self-hosted runners.
        type: boolean
        required: false
        default: false
      dotnet-version:
        description: .NET SDK version range used when global-json-file is empty.
        type: string
        required: false
        default: 10.0.x
      global-json-file:
        description: Optional global.json path used by actions/setup-dotnet.
        type: string
        required: false
        default: ""
      solution:
        description: Solution or project path passed to restore and CleanupCode.
        type: string
        required: true
      working-directory:
        description: Directory where restore, CleanupCode, and Git diff checks run.
        type: string
        required: false
        default: .
      restore-locked-mode:
        description: Runs dotnet restore with --locked-mode.
        type: boolean
        required: false
        default: true
      enable-cache:
        description: Restores and saves NuGet dependency cache with runs-on/cache when true. Set false for cold-restore validation or runners without cache service access.
        type: boolean
        required: false
        default: true
      profile:
        description: CleanupCode profile name.
        type: string
        required: false
        default: "Built-in: Reformat & Apply Syntax Style"
      include:
        description: Optional semicolon-delimited CleanupCode include filter.
        type: string
        required: false
        default: ""
      exclude:
        description: Optional semicolon-delimited CleanupCode exclude filter.
        type: string
        required: false
        default: "**/*.razor;**/*.svg;**/*.md"
      no-updates:
        description: Passes --no-updates to CleanupCode when true.
        type: boolean
        required: false
        default: true
      restore-tools:
        description: Runs dotnet tool restore before CleanupCode when true.
        type: boolean
        required: false
        default: true
      install-tool:
        description: Installs JetBrains.ReSharper.GlobalTools into RUNNER_TEMP instead of using a local tool manifest.
        type: boolean
        required: false
        default: false
      tool-version:
        description: Optional JetBrains.ReSharper.GlobalTools version used when install-tool is true.
        type: string
        required: false
        default: ""
      fail-on-diff:
        description: Fails the workflow when CleanupCode creates a Git diff.
        type: boolean
        required: false
        default: true
      remediation-message:
        description: Message written to the step summary when CleanupCode creates a diff.
        type: string
        required: false
        default: "Run `dotnet husky run --name dotnet-cleanupcode` locally and commit the resulting changes."
      timeout-minutes:
        description: Cleanup verification job timeout.
        type: number
        required: false
        default: 15
      artifact-retention-days:
        description: Diagnostic artifact retention in days.
        type: number
        required: false
        default: 14
    outputs:
      artifact-manifest:
        description: Path to the generated artifact manifest.
        value: ${{ jobs.cleanup.outputs.artifact-manifest }}

permissions: {}

env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  cleanup:
    name: ${{ inputs.solution }} @ ${{ github.head_ref || github.ref_name }}
    runs-on: ${{ fromJSON(inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest'))) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    outputs:
      artifact-manifest: ${{ steps.manifest.outputs.path }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout caller @ ${{ github.repository }}:${{ github.head_ref || github.ref_name }}
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup .NET action tooling @ 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup .NET @ ${{ inputs.global-json-file }}
        if: inputs.global-json-file != ''
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ${{ inputs.global-json-file }}

      - name: Setup .NET @ ${{ inputs.dotnet-version }}
        if: inputs.global-json-file == ''
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Cache NuGet packages @ ${{ runner.os }}-${{ runner.arch }}
        if: inputs.enable-cache
        uses: runs-on/cache@v5.0.7
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '.config/dotnet-tools.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Validate runner contract @ ${{ inputs.runs-on-json || inputs.runs-on || 'ubuntu-latest' }}
        env:
          RUNS_ON_SELF_HOSTED: ${{ inputs.runs-on-self-hosted }}
          RUNS_ON_JSON: ${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}
          ENABLE_CACHE: ${{ inputs.enable-cache }}
          RESTORE_TOOLS: ${{ inputs.restore-tools }}
          INSTALL_TOOL: ${{ inputs.install-tool }}
        run: |
          mkdir -p artifacts/meta artifacts/jetbrains-cleanupcode
          {
            echo "Runs on self-hosted: ${RUNS_ON_SELF_HOSTED}"
            echo "Requested runner labels: ${RUNS_ON_JSON}"
            echo "NuGet cache enabled: ${ENABLE_CACHE}"
            echo "Restore local tools: ${RESTORE_TOOLS}"
            echo "Install JetBrains tool: ${INSTALL_TOOL}"
            echo "Runner OS: ${RUNNER_OS}"
            echo "Runner arch: ${RUNNER_ARCH}"
            echo "Workspace: ${GITHUB_WORKSPACE}"
            dotnet --info
          } | tee artifacts/meta/runner-contract.txt

      - name: Self-hosted preflight @ ${{ inputs.runs-on-json || inputs.runs-on || 'ubuntu-latest' }}
        if: inputs.runs-on-self-hosted
        run: |
          {
            echo "## Self-hosted runner preflight"
            echo
            df -h .
            echo
            printf 'RUNNER_TEMP=%s\n' "${RUNNER_TEMP:-unset}"
            echo
            command -v dotnet
            command -v git
          } | tee artifacts/meta/self-hosted-preflight.txt

      - name: Restore ${{ inputs.solution }} with lock file
        if: inputs.restore-locked-mode
        env:
          SOLUTION: ${{ inputs.solution }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: |
          cd "$WORKING_DIRECTORY"
          dotnet restore "$SOLUTION" --locked-mode

      - name: Restore ${{ inputs.solution }}
        if: ${{ !inputs.restore-locked-mode }}
        env:
          SOLUTION: ${{ inputs.solution }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: |
          cd "$WORKING_DIRECTORY"
          dotnet restore "$SOLUTION"

      - name: Checkout platform action @ ${{ fromJSON(toJSON(job)).workflow_repository }}:${{ fromJSON(toJSON(job)).workflow_sha }}
        uses: actions/checkout@v7
        with:
          # fromJSON(toJSON(job)) is only there because our pinned actionlint:1.7.12 does not know the newer documented job.workflow_ref / job.workflow_sha fields.
          repository: ${{ fromJSON(toJSON(job)).workflow_repository }}
          ref: ${{ fromJSON(toJSON(job)).workflow_sha }}
          path: .ci/arkanis-ci
          persist-credentials: false
          sparse-checkout: |
            .github/actions/dotnet-jetbrains-cleanupcode
          sparse-checkout-cone-mode: false

      - name: Verify JetBrains CleanupCode @ ${{ inputs.profile }}
        uses: ./.ci/arkanis-ci/.github/actions/dotnet-jetbrains-cleanupcode
        with:
          solution: ${{ inputs.solution }}
          working-directory: ${{ inputs.working-directory }}
          profile: ${{ inputs.profile }}
          include: ${{ inputs.include }}
          exclude: ${{ inputs.exclude }}
          no-updates: ${{ inputs.no-updates }}
          restore-tools: ${{ inputs.restore-tools }}
          install-tool: ${{ inputs.install-tool }}
          tool-version: ${{ inputs.tool-version }}
          fail-on-diff: ${{ inputs.fail-on-diff }}
          remediation-message: ${{ inputs.remediation-message }}
          artifacts-path: ${{ github.workspace }}/artifacts/jetbrains-cleanupcode

      - name: Write artifact manifest @ artifacts/artifact-manifest.json
        id: manifest
        if: always()
        env:
          RETENTION_DAYS: ${{ inputs.artifact-retention-days }}
        run: |
          mkdir -p artifacts
          cat > artifacts/artifact-manifest.json <<JSON
          {
            "schema": "ci-artifact-manifest/v1",
            "producer": {
              "repository": "${GITHUB_REPOSITORY}",
              "workflow": "wf-setup-dotnet-jetbrains",
              "run_id": "${GITHUB_RUN_ID}",
              "run_attempt": "${GITHUB_RUN_ATTEMPT}",
              "sha": "${GITHUB_SHA}",
              "job": "cleanup"
            },
            "artifacts": [
              {
                "name": "${GITHUB_REPOSITORY#*/}-dotnet-jetbrains-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}",
                "kind": "diagnostics",
                "paths": ["artifacts"],
                "retention_days": ${RETENTION_DAYS}
              }
            ]
          }
          JSON
          echo "path=artifacts/artifact-manifest.json" >> "$GITHUB_OUTPUT"

      - name: Publish summary @ ${{ steps.manifest.outputs.path || github.run_id }}
        if: always()
        env:
          SOLUTION: ${{ inputs.solution }}
          PROFILE: ${{ inputs.profile }}
          EXCLUDE: ${{ inputs.exclude }}
          FAIL_ON_DIFF: ${{ inputs.fail-on-diff }}
        run: |
          {
            echo "# .NET JetBrains CleanupCode"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Runs on self-hosted | \`${{ inputs.runs-on-self-hosted }}\` |"
            echo "| Runner labels | \`${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}\` |"
            echo "| Solution | \`${SOLUTION}\` |"
            echo "| Profile | \`${PROFILE}\` |"
            echo "| Exclude | \`${EXCLUDE}\` |"
            echo "| Fail on diff | \`${FAIL_ON_DIFF}\` |"
            echo "| Artifact manifest | \`${{ steps.manifest.outputs.path }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload diagnostics @ ${{ github.event.repository.name }}-dotnet-jetbrains-${{ github.run_id }}-${{ github.run_attempt }}
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-dotnet-jetbrains-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts
          if-no-files-found: warn
          retention-days: ${{ inputs.artifact-retention-days }}
