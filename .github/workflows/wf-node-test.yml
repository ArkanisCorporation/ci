# Summary:
#   Reusable Node.js test workflow.
# Remarks:
#   This workflow installs dependencies through the shared setup action and runs one test command.
#   It does not lint, build, publish, or deploy.

name: wf-node-test

on:
  workflow_call:
    inputs:
      runs-on:
        description: Single runner label used when runs-on-json is empty.
        type: string
        required: false
        default: ubuntu-latest
      runs-on-json:
        description: JSON array passed to runs-on, including GitHub-hosted image labels or self-hosted runner labels. Overrides runs-on when set.
        type: string
        required: false
        default: ""
      runs-on-self-hosted:
        description: True when the effective runner selection targets self-hosted runners.
        type: boolean
        required: false
        default: false
      node-version:
        description: Node.js version range installed by actions/setup-node.
        type: string
        required: false
        default: 24.x
      package-manager:
        description: Package manager used for cache detection, install, and scripts. Supported values are npm, pnpm, and yarn.
        type: string
        required: false
        default: pnpm
      package-manager-version:
        description: Optional pnpm or yarn version installed by Corepack. Required for pnpm/yarn when package.json lacks packageManager.
        type: string
        required: false
        default: ""
      working-directory:
        description: Directory containing package.json and the selected lockfile.
        type: string
        required: false
        default: .
      cache-dependency-path:
        description: Optional newline-delimited lockfile glob list relative to the repository root. Defaults to selected package-manager lockfile in working-directory.
        type: string
        required: false
        default: ""
      enable-cache:
        description: Restores and saves package-manager cache with runs-on/cache when true. Set false for cold-test validation or runners without cache service access.
        type: boolean
        required: false
        default: true
      run-install:
        description: Runs dependency installation when true.
        type: boolean
        required: false
        default: true
      install-command:
        description: Optional install command run from working-directory instead of generated strict install command.
        type: string
        required: false
        default: ""
      allow-lifecycle-scripts:
        description: Allows dependency lifecycle scripts during generated install command. Keep false for untrusted pull_request verification.
        type: boolean
        required: false
        default: false
      test-script:
        description: package.json script name used for tests when test-command is empty.
        type: string
        required: false
        default: test
      test-command:
        description: Optional test command run from working-directory.
        type: string
        required: false
        default: ""
      artifact-retention-days:
        description: Diagnostic artifact retention in days.
        type: number
        required: false
        default: 14
      upload-diagnostics:
        description: Uploads diagnostics artifact when true. Set false for local act smoke tests that cannot emulate upload-artifact.
        type: boolean
        required: false
        default: true
      timeout-minutes:
        description: Test job timeout.
        type: number
        required: false
        default: 20
    outputs:
      artifact-manifest:
        description: Path to the generated artifact manifest.
        value: ${{ jobs.test.outputs.artifact-manifest }}
      run-metadata:
        description: Path to the generated run metadata.
        value: ${{ jobs.test.outputs.run-metadata }}

permissions: {}

jobs:
  test:
    name: ${{ inputs.working-directory }} @ ${{ github.head_ref || github.ref_name }}
    runs-on: ${{ fromJSON(inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest'))) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    outputs:
      artifact-manifest: ${{ steps.manifest.outputs.path }}
      run-metadata: ${{ steps.metadata.outputs.path }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout caller @ ${{ github.repository }}:${{ github.head_ref || github.ref_name }}
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Checkout setup action @ ${{ fromJSON(toJSON(job)).workflow_repository }}:${{ fromJSON(toJSON(job)).workflow_sha }}
        uses: actions/checkout@v7
        with:
          # fromJSON(toJSON(job)) is only there because our pinned actionlint:1.7.12 does not know the newer documented job.workflow_ref / job.workflow_sha fields.
          repository: ${{ fromJSON(toJSON(job)).workflow_repository }}
          ref: ${{ fromJSON(toJSON(job)).workflow_sha }}
          path: .ci/arkanis-ci
          persist-credentials: false
          sparse-checkout: |
            .github/actions/setup-node
          sparse-checkout-cone-mode: false

      - name: Setup Node.js @ ${{ inputs.node-version }} ${{ inputs.package-manager }}
        id: setup-node
        uses: ./.ci/arkanis-ci/.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
          package-manager: ${{ inputs.package-manager }}
          package-manager-version: ${{ inputs.package-manager-version }}
          working-directory: ${{ inputs.working-directory }}
          cache-dependency-path: ${{ inputs.cache-dependency-path }}
          enable-cache: ${{ inputs.enable-cache }}
          run-install: ${{ inputs.run-install }}
          install-command: ${{ inputs.install-command }}
          allow-lifecycle-scripts: ${{ inputs.allow-lifecycle-scripts }}

      - name: Validate runner contract @ ${{ inputs.runs-on-json || inputs.runs-on || 'ubuntu-latest' }}
        env:
          RUNS_ON_SELF_HOSTED: ${{ inputs.runs-on-self-hosted }}
          RUNS_ON_JSON: ${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}
          ENABLE_CACHE: ${{ inputs.enable-cache }}
          PACKAGE_MANAGER: ${{ inputs.package-manager }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: |
          {
            echo "Runs on self-hosted: ${RUNS_ON_SELF_HOSTED}"
            echo "Requested runner labels: ${RUNS_ON_JSON}"
            echo "Package manager: ${PACKAGE_MANAGER}"
            echo "Working directory: ${WORKING_DIRECTORY}"
            echo "Package cache enabled: ${ENABLE_CACHE}"
            echo "Package cache hit: ${{ steps.setup-node.outputs.cache-hit || 'false' }}"
            echo "Runner OS: ${RUNNER_OS}"
            echo "Runner arch: ${RUNNER_ARCH}"
            echo "Workspace: ${GITHUB_WORKSPACE}"
          } | tee artifacts/meta/runner-contract.txt

      - name: Self-hosted preflight @ ${{ inputs.runs-on-json || inputs.runs-on || 'ubuntu-latest' }}
        if: inputs.runs-on-self-hosted
        env:
          PACKAGE_MANAGER: ${{ inputs.package-manager }}
        run: |
          {
            echo "## Self-hosted runner preflight"
            echo
            df -h .
            echo
            command -v git
            command -v node
            command -v npm
            command -v "$PACKAGE_MANAGER"
          } | tee artifacts/meta/self-hosted-preflight.txt

      - name: Test ${{ inputs.working-directory }} @ ${{ inputs.test-script }}
        env:
          PACKAGE_MANAGER: ${{ inputs.package-manager }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          TEST_SCRIPT: ${{ inputs.test-script }}
          TEST_COMMAND: ${{ inputs.test-command }}
        run: |
          set -euo pipefail
          cd "$WORKING_DIRECTORY"
          mkdir -p "$GITHUB_WORKSPACE/artifacts/node"

          run_logged() {
            local log_file="$1"
            shift
            "$@" 2>&1 | tee "$GITHUB_WORKSPACE/$log_file"
            local status="${PIPESTATUS[0]}"
            return "$status"
          }

          if [[ -n "$TEST_COMMAND" ]]; then
            run_logged artifacts/node/test.log bash -lc "$TEST_COMMAND"
            exit $?
          fi

          if ! node -e 'const fs = require("fs"); const script = process.argv[1]; const pkg = JSON.parse(fs.readFileSync("package.json", "utf8")); process.exit(pkg.scripts && Object.prototype.hasOwnProperty.call(pkg.scripts, script) ? 0 : 1);' "$TEST_SCRIPT"; then
            echo "package.json script '${TEST_SCRIPT}' not found." >&2
            exit 2
          fi

          run_logged artifacts/node/test.log "$PACKAGE_MANAGER" run "$TEST_SCRIPT"

      - name: Write run metadata @ artifacts/meta/run-metadata.json
        id: metadata
        if: always()
        env:
          RUNS_ON_JSON: ${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}
          NODE_VERSION: ${{ steps.setup-node.outputs.node-version }}
          PACKAGE_MANAGER: ${{ inputs.package-manager }}
          PACKAGE_MANAGER_VERSION: ${{ steps.setup-node.outputs.package-manager-version }}
        run: |
          mkdir -p artifacts/meta
          cat > artifacts/meta/run-metadata.json <<JSON
          {
            "schema": "run-metadata/v1",
            "repository": "${GITHUB_REPOSITORY}",
            "workflow": "wf-node-test",
            "sha": "${GITHUB_SHA}",
            "ref": "${GITHUB_REF}",
            "event_name": "${GITHUB_EVENT_NAME}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "runner": {
              "os": "${RUNNER_OS}",
              "arch": "${RUNNER_ARCH}",
              "labels": ${RUNS_ON_JSON}
            },
            "tool_versions": {
              "node": "${NODE_VERSION}",
              "${PACKAGE_MANAGER}": "${PACKAGE_MANAGER_VERSION}"
            }
          }
          JSON
          echo "path=artifacts/meta/run-metadata.json" >> "$GITHUB_OUTPUT"

      - name: Write artifact manifest @ artifacts/artifact-manifest.json
        id: manifest
        if: always()
        env:
          RETENTION_DAYS: ${{ inputs.artifact-retention-days }}
        run: |
          mkdir -p artifacts
          cat > artifacts/artifact-manifest.json <<JSON
          {
            "schema": "ci-artifact-manifest/v1",
            "producer": {
              "repository": "${GITHUB_REPOSITORY}",
              "workflow": "wf-node-test",
              "run_id": "${GITHUB_RUN_ID}",
              "run_attempt": "${GITHUB_RUN_ATTEMPT}",
              "sha": "${GITHUB_SHA}",
              "job": "test"
            },
            "artifacts": [
              {
                "name": "${GITHUB_REPOSITORY#*/}-node-test-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}",
                "kind": "diagnostics",
                "paths": ["artifacts"],
                "retention_days": ${RETENTION_DAYS}
              }
            ]
          }
          JSON
          echo "path=artifacts/artifact-manifest.json" >> "$GITHUB_OUTPUT"

      - name: Publish summary @ ${{ steps.manifest.outputs.path || github.run_id }}
        if: always()
        env:
          PACKAGE_MANAGER: ${{ inputs.package-manager }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: |
          {
            echo "# Node test"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Runs on self-hosted | \`${{ inputs.runs-on-self-hosted }}\` |"
            echo "| Runner labels | \`${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}\` |"
            echo "| Node version | \`${{ inputs.node-version }}\` |"
            echo "| Package manager | \`${PACKAGE_MANAGER}\` |"
            echo "| Working directory | \`${WORKING_DIRECTORY}\` |"
            echo "| Test script | \`${{ inputs.test-script }}\` |"
            echo "| Artifact manifest | \`${{ steps.manifest.outputs.path }}\` |"
            echo "| Run metadata | \`${{ steps.metadata.outputs.path }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload diagnostics @ ${{ github.event.repository.name }}-node-test-${{ github.run_id }}-${{ github.run_attempt }}
        if: ${{ always() && inputs.upload-diagnostics }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-node-test-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts
          if-no-files-found: warn
          retention-days: ${{ inputs.artifact-retention-days }}
