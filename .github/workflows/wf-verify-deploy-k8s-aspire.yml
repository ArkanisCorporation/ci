# Summary:
#   Reusable Aspire Kubernetes deployment verification workflow.
# Remarks:
#   This workflow validates deployment inputs and tool availability without applying cluster changes.
#   It does not bind a GitHub environment or read deployment secrets.

name: wf-verify-deploy-k8s-aspire

on:
  workflow_call:
    inputs:
      runs-on:
        description: Single runner label used when runs-on-json is empty.
        type: string
        required: false
        default: ubuntu-latest
      runs-on-json:
        description: JSON array passed to runs-on, including GitHub-hosted image labels or self-hosted runner labels. Overrides runs-on when set.
        type: string
        required: false
        default: ""
      runs-on-self-hosted:
        description: True when the effective runner selection targets self-hosted runners.
        type: boolean
        required: false
        default: false
      aspire-environment:
        description: Aspire deployment environment.
        type: string
        required: true
      kubernetes-namespace:
        description: Kubernetes namespace receiving the deployment.
        type: string
        required: true
      apphost-project:
        description: Aspire AppHost project path.
        type: string
        required: true
      output-path:
        description: Aspire deploy output path.
        type: string
        required: false
        default: artifacts/k8s
      image-tag:
        description: Optional Kubernetes:Images:Tag override.
        type: string
        required: false
        default: ""
      dotnet-version:
        description: .NET SDK version range.
        type: string
        required: false
        default: 10.0.x
      global-json-file:
        description: Optional global.json path passed to actions/setup-dotnet.
        type: string
        required: false
        default: ""
      enable-cache:
        description: Restores and saves NuGet dependency cache with runs-on/cache when true. Set false for cold-deploy validation or runners without cache service access.
        type: boolean
        required: false
        default: true
      kubectl-version:
        description: kubectl version installed before deployment validation.
        type: string
        required: false
        default: v1.36.2
      helm-version:
        description: Helm version installed before deployment validation.
        type: string
        required: false
        default: v4.2.2
      timeout-minutes:
        description: Verification job timeout.
        type: number
        required: false
        default: 45
      artifact-retention-days:
        description: Deployment verification artifact retention in days.
        type: number
        required: false
        default: 30
    outputs:
      artifact-manifest:
        description: Path to the generated artifact manifest.
        value: ${{ jobs.verify.outputs.artifact-manifest }}

permissions: {}

env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  verify:
    name: ${{ inputs.image-tag || inputs.kubernetes-namespace }}
    runs-on: ${{ fromJSON(inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest'))) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    outputs:
      artifact-manifest: ${{ steps.manifest.outputs.path }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout caller @ ${{ github.repository }}:${{ github.head_ref || github.ref_name }}
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup .NET @ ${{ inputs.global-json-file || inputs.dotnet-version }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          global-json-file: ${{ inputs.global-json-file }}

      - name: Cache NuGet packages @ ${{ runner.os }}-${{ runner.arch }}
        if: inputs.enable-cache
        uses: runs-on/cache@v5.0.7
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '.config/dotnet-tools.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore local .NET tools @ .config/dotnet-tools.json
        run: dotnet tool restore || (echo "First dotnet tool restore failed; retrying once." && dotnet tool restore)

      - name: Setup kubectl @ ${{ inputs.kubectl-version }}
        uses: azure/setup-kubectl@v5.1.0
        with:
          version: ${{ inputs.kubectl-version }}

      - name: Setup Helm @ ${{ inputs.helm-version }}
        uses: azure/setup-helm@v5.0.1
        with:
          version: ${{ inputs.helm-version }}

      - name: Validate runner contract @ ${{ inputs.runs-on-json || inputs.runs-on || 'ubuntu-latest' }}
        env:
          RUNS_ON_SELF_HOSTED: ${{ inputs.runs-on-self-hosted }}
          RUNS_ON_JSON: ${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}
          ENABLE_CACHE: ${{ inputs.enable-cache }}
        run: |
          mkdir -p artifacts/meta
          {
            echo "Runs on self-hosted: ${RUNS_ON_SELF_HOSTED}"
            echo "Requested runner labels: ${RUNS_ON_JSON}"
            echo "NuGet cache enabled: ${ENABLE_CACHE}"
            echo "Runner OS: ${RUNNER_OS}"
            echo "Runner arch: ${RUNNER_ARCH}"
            dotnet --version
            kubectl version --client=true
            helm version --short
          } | tee artifacts/meta/runner-contract.txt

      - name: Self-hosted preflight @ ${{ inputs.runs-on-json || inputs.runs-on || 'ubuntu-latest' }}
        if: inputs.runs-on-self-hosted
        run: |
          {
            echo "## Self-hosted runner preflight"
            echo
            df -h .
            echo
            command -v dotnet
            command -v kubectl
            command -v helm
          } | tee artifacts/meta/self-hosted-preflight.txt

      - name: Validate deployment inputs (Dry Run) @ ${{ inputs.kubernetes-namespace }}
        env:
          KUBERNETES_NAMESPACE: ${{ inputs.kubernetes-namespace }}
          APPHOST_PROJECT: ${{ inputs.apphost-project }}
        run: |
          if [[ ! "$KUBERNETES_NAMESPACE" =~ ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$ ]]; then
            echo "Invalid Kubernetes namespace: ${KUBERNETES_NAMESPACE}" >&2
            exit 2
          fi

          if [[ ! -f "$APPHOST_PROJECT" ]]; then
            echo "Aspire AppHost project was not found: ${APPHOST_PROJECT}" >&2
            exit 2
          fi

      - name: Write artifact manifest @ artifacts/artifact-manifest.json
        id: manifest
        if: always()
        env:
          RETENTION_DAYS: ${{ inputs.artifact-retention-days }}
        run: |
          mkdir -p artifacts
          cat > artifacts/artifact-manifest.json <<JSON
          {
            "schema": "ci-artifact-manifest/v1",
            "producer": {
              "repository": "${GITHUB_REPOSITORY}",
              "workflow": "wf-verify-deploy-k8s-aspire",
              "run_id": "${GITHUB_RUN_ID}",
              "run_attempt": "${GITHUB_RUN_ATTEMPT}",
              "sha": "${GITHUB_SHA}",
              "job": "verify"
            },
            "artifacts": [
              {
                "name": "${GITHUB_REPOSITORY#*/}-k8s-verify-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}",
                "kind": "deploy-report",
                "paths": ["artifacts/artifact-manifest.json"],
                "retention_days": ${RETENTION_DAYS}
              }
            ]
          }
          JSON
          echo "path=artifacts/artifact-manifest.json" >> "$GITHUB_OUTPUT"

      - name: Publish summary @ ${{ steps.manifest.outputs.path || github.run_id }}
        if: always()
        env:
          ASPIRE_ENVIRONMENT: ${{ inputs.aspire-environment }}
          KUBERNETES_NAMESPACE: ${{ inputs.kubernetes-namespace }}
        run: |
          {
            echo "# Aspire Kubernetes deployment verification"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Runs on self-hosted | \`${{ inputs.runs-on-self-hosted }}\` |"
            echo "| Runner labels | \`${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}\` |"
            echo "| Aspire environment | \`${ASPIRE_ENVIRONMENT}\` |"
            echo "| Namespace | \`${KUBERNETES_NAMESPACE}\` |"
            echo "| Manifest | \`${{ steps.manifest.outputs.path }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deployment artifacts (Dry Run) @ ${{ github.event.repository.name }}-k8s-verify-${{ github.run_id }}-${{ github.run_attempt }}
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-k8s-verify-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/artifact-manifest.json
          if-no-files-found: warn
          retention-days: ${{ inputs.artifact-retention-days }}
