# Summary:
#   Reusable NuGet package verification workflow.
# Remarks:
#   This workflow builds package artifacts without publishing them.
#   It does not bind a GitHub environment, request id-token, or read package publishing secrets.

name: wf-verify-publish-nuget

on:
  workflow_call:
    inputs:
      runs-on:
        description: Single runner label used when runs-on-json is empty.
        type: string
        required: false
        default: ubuntu-latest
      runs-on-json:
        description: JSON array passed to runs-on, including GitHub-hosted image labels or self-hosted runner labels. Overrides runs-on when set.
        type: string
        required: false
        default: ""
      runs-on-self-hosted:
        description: True when the effective runner selection targets self-hosted runners.
        type: boolean
        required: false
        default: false
      project:
        description: Project path passed to dotnet restore and dotnet pack.
        type: string
        required: true
      version:
        description: PackageVersion value passed to dotnet pack.
        type: string
        required: true
      dotnet-version:
        description: .NET SDK version used for setup and version stamping.
        type: string
        required: false
        default: 10.0.x
      global-json-file:
        description: Optional global.json path passed to actions/setup-dotnet and dotnet-setversion.
        type: string
        required: false
        default: ""
      configuration:
        description: Build configuration.
        type: string
        required: false
        default: Release
      enable-cache:
        description: Restores and saves NuGet dependency cache with runs-on/cache when true. Set false for cold-pack validation or runners without cache service access.
        type: boolean
        required: false
        default: true
      include-symbols:
        description: Creates a .snupkg with dotnet pack --include-symbols and SymbolPackageFormat=snupkg.
        type: boolean
        required: false
        default: true
      include-source:
        description: Passes --include-source to dotnet pack when true.
        type: boolean
        required: false
        default: true
      dotnet-setversion:
        description: Runs the dotnet-setversion action before dotnet pack when true. Requires version to be a bare semantic version.
        type: boolean
        required: false
        default: true
      dotnet-setversion-working-directory:
        description: Working directory whose csproj files are stamped before dotnet pack.
        type: string
        required: false
        default: .
      dotnet-setversion-recursive:
        description: Recursively stamps csproj files under dotnet-setversion-working-directory when true.
        type: boolean
        required: false
        default: true
      dotnet-setversion-project:
        description: Optional project path passed to setversion when recursive stamping is false.
        type: string
        required: false
        default: ""
      dotnet-setversion-tool-version:
        description: dotnet-setversion tool package version installed by the composite action.
        type: string
        required: false
        default: 4.0.0
      timeout-minutes:
        description: Verification job timeout.
        type: number
        required: false
        default: 30
      artifact-retention-days:
        description: Package artifact retention in days.
        type: number
        required: false
        default: 30
    outputs:
      artifact-manifest:
        description: Path to the generated artifact manifest.
        value: ${{ jobs.verify.outputs.artifact-manifest }}

permissions: {}

jobs:
  verify:
    name: ${{ inputs.version }}
    runs-on: ${{ fromJSON(inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest'))) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    outputs:
      artifact-manifest: ${{ steps.pack.outputs.artifact-manifest }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout caller @ ${{ github.repository }}:${{ github.head_ref || github.ref_name }}
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Checkout platform pack action @ ${{ fromJSON(toJSON(job)).workflow_repository }}:${{ fromJSON(toJSON(job)).workflow_sha }}
        uses: actions/checkout@v7
        with:
          # fromJSON(toJSON(job)) is only there because our pinned actionlint:1.7.12 does not know the newer documented job.workflow_ref / job.workflow_sha fields.
          repository: ${{ fromJSON(toJSON(job)).workflow_repository }}
          ref: ${{ fromJSON(toJSON(job)).workflow_sha }}
          path: .ci/arkanis-ci
          persist-credentials: false
          sparse-checkout: |
            .github/actions/dotnet-pack-nuget
          sparse-checkout-cone-mode: false

      - name: Pack ${{ inputs.project }} @ ${{ inputs.version }}
        id: pack
        uses: ./.ci/arkanis-ci/.github/actions/dotnet-pack-nuget
        with:
          project: ${{ inputs.project }}
          version: ${{ inputs.version }}
          dotnet-version: ${{ inputs.dotnet-version }}
          global-json-file: ${{ inputs.global-json-file }}
          configuration: ${{ inputs.configuration }}
          enable-cache: ${{ inputs.enable-cache }}
          runs-on-json: ${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}
          runs-on-self-hosted: ${{ inputs.runs-on-self-hosted }}
          include-symbols: ${{ inputs.include-symbols }}
          include-source: ${{ inputs.include-source }}
          dotnet-setversion: ${{ inputs.dotnet-setversion }}
          dotnet-setversion-working-directory: ${{ inputs.dotnet-setversion-working-directory }}
          dotnet-setversion-recursive: ${{ inputs.dotnet-setversion-recursive }}
          dotnet-setversion-project: ${{ inputs.dotnet-setversion-project }}
          dotnet-setversion-tool-version: ${{ inputs.dotnet-setversion-tool-version }}
          artifact-name: ${{ github.event.repository.name }}-nuget-verify-${{ inputs.version }}
          artifact-retention-days: ${{ inputs.artifact-retention-days }}
          workflow-name: wf-verify-publish-nuget

      - name: Upload package artifacts @ ${{ github.event.repository.name }}-nuget-verify-${{ inputs.version }}-${{ github.run_id }}-${{ github.run_attempt }}
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-nuget-verify-${{ inputs.version }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts
            ${{ runner.debug != '1' && '!artifacts/**/bin/**' || '' }}
            ${{ runner.debug != '1' && '!artifacts/**/obj/**' || '' }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention-days }}
