# Summary:
#   Validates platform workflow contract files.
# Remarks:
#   This workflow is callable for dogfooding and runnable directly for local act smoke tests.
#   It does not publish, deploy, or request secrets.

name: wf-platform-selftest

on:
  workflow_call:
    inputs:
      runs-on:
        description: Single runner label used when runs-on-json is empty.
        type: string
        required: false
        default: ubuntu-latest
      runs-on-json:
        description: JSON array passed to runs-on, including GitHub-hosted image labels or self-hosted runner labels. Overrides runs-on when set.
        type: string
        required: false
        default: ""
      runs-on-self-hosted:
        description: True when the effective runner selection targets self-hosted runners.
        type: boolean
        required: false
        default: false
  workflow_dispatch:

permissions: {}

jobs:
  validate:
    name: contracts @ ${{ github.head_ref || github.ref_name }}
    runs-on: ${{ fromJSON(inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest'))) }}
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout platform @ ${{ github.repository }}:${{ github.head_ref || github.ref_name }}
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python 3.14 + pipx
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"
          pip-install: "pipx"

      - name: Set up Node.js 24 + npm
        uses: actions/setup-node@v7
        with:
          node-version: "24.x"
          package-manager-cache: false

      - name: Actionlint @ 1.7.12
        uses: raven-actions/actionlint@v2
        with:
          version: 1.7.12
          flags: -color

      - name: Setup .NET @ 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Validate workflow contracts @ scripts/validate-workflows.cs
        run: dotnet run --file scripts/validate-workflows.cs

      - name: Publish summary @ ${{ github.run_id }}
        if: always()
        env:
          RUNS_ON_JSON: ${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}
          RUNS_ON_SELF_HOSTED: ${{ inputs.runs-on-self-hosted || false }}
        run: |
          python_version="$(command -v python >/dev/null 2>&1 && python --version 2>&1 || echo unavailable)"
          pipx_version="$(command -v pipx >/dev/null 2>&1 && pipx --version 2>&1 || echo unavailable)"
          node_version="$(command -v node >/dev/null 2>&1 && node --version 2>&1 || echo unavailable)"
          npm_version="$(command -v npm >/dev/null 2>&1 && npm --version 2>&1 || echo unavailable)"

          {
            echo "## Platform selftest"
            echo ""
            echo "- Actionlint: \`1.7.12\`"
            echo "- Python: \`${python_version}\`"
            echo "- pipx: \`${pipx_version}\`"
            echo "- Node: \`${node_version}\`"
            echo "- npm: \`${npm_version}\`"
            echo "- Validator: \`scripts/validate-workflows.cs\`"
            echo "- Runner labels: \`$RUNS_ON_JSON\`"
            echo "- Self-hosted: \`$RUNS_ON_SELF_HOSTED\`"
          } >> "$GITHUB_STEP_SUMMARY"
