# Summary:
#   Reusable .NET verification workflow for restore, formatting, build, tests, coverage collection, metadata, and diagnostics.
# Remarks:
#   This workflow runs in the caller repository context.
#   It checks out caller source, writes artifacts under `artifacts/`, and uploads diagnostics even on failure.
#   Preconditions include a valid solution or project path, a compatible .NET SDK version or global.json, and lock files when locked restore is enabled.
#   It can generate ReportGenerator coverage reports and update one pull request comment.
#   It calls runs-on/cache only when enable-cache is true.
#   It does not publish packages, images, releases, or deployments.

name: wf-setup-dotnet

on:
  workflow_call:
    inputs:
      runs-on:
        description: Single runner label used when runs-on-json is empty.
        type: string
        required: false
        default: ubuntu-latest
      runs-on-json:
        description: JSON array passed to runs-on, including GitHub-hosted image labels or self-hosted runner labels. Overrides runs-on when set.
        type: string
        required: false
        default: ""
      runs-on-self-hosted:
        description: True when the effective runner selection targets self-hosted runners.
        type: boolean
        required: false
        default: false
      dotnet-version:
        description: .NET SDK version range used when global-json-file is empty.
        type: string
        required: false
        default: 10.0.x
      global-json-file:
        description: Optional global.json path used by actions/setup-dotnet.
        type: string
        required: false
        default: ""
      solution:
        description: Solution or project path to restore, build, format, and test.
        type: string
        required: true
      configuration:
        description: Build configuration.
        type: string
        required: false
        default: Release
      restore-locked-mode:
        description: Runs dotnet restore with --locked-mode.
        type: boolean
        required: false
        default: true
      enable-cache:
        description: Restores and saves NuGet dependency cache with runs-on/cache when true. Set false for cold-restore validation or runners without cache service access.
        type: boolean
        required: false
        default: true
      run-format:
        description: Runs dotnet format verification.
        type: boolean
        required: false
        default: true
      run-tests:
        description: Runs dotnet test after build.
        type: boolean
        required: false
        default: true
      test-filter:
        description: Optional dotnet test filter expression.
        type: string
        required: false
        default: ""
      coverage:
        description: Collects XPlat Code Coverage during tests.
        type: boolean
        required: false
        default: true
      coverage-report:
        description: Generates ReportGenerator coverage output when coverage is true.
        type: boolean
        required: false
        default: true
      coverage-pr-comment:
        description: Updates one pull request coverage comment when coverage-report is true.
        type: boolean
        required: false
        default: true
      coverage-reporttypes:
        description: Semicolon-delimited ReportGenerator output types.
        type: string
        required: false
        default: HtmlInline;Cobertura;MarkdownSummaryGithub;TextSummary
      coverage-assemblyfilters:
        description: Semicolon-delimited ReportGenerator assembly filters.
        type: string
        required: false
        default: +*;-*.UnitTests;-*.IntegrationTests
      coverage-report-custom-settings:
        description: Optional ReportGenerator customSettings value.
        type: string
        required: false
        default: ""
      coverage-report-tool-version:
        description: dotnet-reportgenerator-globaltool package version.
        type: string
        required: false
        default: 5.5.10
      artifact-retention-days:
        description: Diagnostic artifact retention in days.
        type: number
        required: false
        default: 14
      timeout-minutes:
        description: Verification job timeout.
        type: number
        required: false
        default: 30
    outputs:
      artifact-manifest:
        description: Path to the generated artifact manifest.
        value: ${{ jobs.verify.outputs.artifact-manifest }}
      run-metadata:
        description: Path to the generated run metadata.
        value: ${{ jobs.verify.outputs.run-metadata }}

permissions: {}

env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  verify:
    name: ${{ inputs.solution }} @ ${{ github.head_ref || github.ref_name }}
    runs-on: ${{ fromJSON(inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest'))) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      pull-requests: write
    outputs:
      artifact-manifest: ${{ steps.manifest.outputs.path }}
      run-metadata: ${{ steps.metadata.outputs.path }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout caller @ ${{ github.repository }}:${{ github.head_ref || github.ref_name }}
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup .NET action tooling @ 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup .NET @ ${{ inputs.global-json-file }}
        if: inputs.global-json-file != ''
        id: setup-dotnet-global-json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ${{ inputs.global-json-file }}

      - name: Setup .NET @ ${{ inputs.dotnet-version }}
        if: inputs.global-json-file == ''
        id: setup-dotnet-version
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Cache NuGet packages @ ${{ runner.os }}-${{ runner.arch }}
        if: inputs.enable-cache
        uses: runs-on/cache@v5.0.7
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '.config/dotnet-tools.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Record tool versions @ dotnet
        id: tool-versions
        run: |
          mkdir -p artifacts/meta
          dotnet --info | tee artifacts/meta/dotnet-info.txt
          dotnet_version="$(dotnet --version)"
          printf 'tool_versions_json={"dotnet":"%s"}\n' "$dotnet_version" >> "$GITHUB_OUTPUT"

      - name: Validate runner contract @ ${{ inputs.runs-on-json || inputs.runs-on || 'ubuntu-latest' }}
        env:
          RUNS_ON_SELF_HOSTED: ${{ inputs.runs-on-self-hosted }}
          RUNS_ON_JSON: ${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}
          ENABLE_CACHE: ${{ inputs.enable-cache }}
        run: |
          {
            echo "Runs on self-hosted: ${RUNS_ON_SELF_HOSTED}"
            echo "Requested runner labels: ${RUNS_ON_JSON}"
            echo "NuGet cache enabled: ${ENABLE_CACHE}"
            echo "Runner OS: ${RUNNER_OS}"
            echo "Runner arch: ${RUNNER_ARCH}"
            echo "Workspace: ${GITHUB_WORKSPACE}"
          } | tee artifacts/meta/runner-contract.txt

      - name: Self-hosted preflight @ ${{ inputs.runs-on-json || inputs.runs-on || 'ubuntu-latest' }}
        if: inputs.runs-on-self-hosted
        run: |
          {
            echo "## Self-hosted runner preflight"
            echo
            echo "Disk:"
            df -h .
            echo
            echo "Temp:"
            printf '%s\n' "${RUNNER_TEMP:-unset}"
            echo
            echo "Required tools:"
            command -v dotnet
            command -v git
          } | tee artifacts/meta/self-hosted-preflight.txt

      - name: Restore local .NET tools @ .config/dotnet-tools.json
        run: dotnet tool restore || (echo "First dotnet tool restore failed; retrying once." && dotnet tool restore)

      - name: Restore ${{ inputs.solution }} with lock file
        if: inputs.restore-locked-mode
        env:
          SOLUTION: ${{ inputs.solution }}
        run: dotnet restore "$SOLUTION" --locked-mode

      - name: Restore ${{ inputs.solution }}
        if: ${{ !inputs.restore-locked-mode }}
        env:
          SOLUTION: ${{ inputs.solution }}
        run: dotnet restore "$SOLUTION"

      - name: Verify formatting @ ${{ inputs.solution }}
        if: inputs.run-format
        env:
          SOLUTION: ${{ inputs.solution }}
        run: dotnet format "$SOLUTION" --verify-no-changes --verbosity diagnostic --no-restore

      - name: Build ${{ inputs.solution }} @ ${{ inputs.configuration }}
        env:
          SOLUTION: ${{ inputs.solution }}
          CONFIGURATION: ${{ inputs.configuration }}
        run: |
          mkdir -p artifacts/msbuild
          dotnet build "$SOLUTION" \
            --configuration "$CONFIGURATION" \
            --no-restore \
            -p:ContinuousIntegrationBuild=true \
            -bl:artifacts/msbuild/build.binlog

      - name: Test ${{ inputs.solution }} @ ${{ inputs.configuration }} coverage=${{ inputs.coverage }}
        if: inputs.run-tests
        env:
          SOLUTION: ${{ inputs.solution }}
          CONFIGURATION: ${{ inputs.configuration }}
          TEST_FILTER: ${{ inputs.test-filter }}
          COVERAGE: ${{ inputs.coverage }}
        run: |
          mkdir -p artifacts/test-results
          test_args=(
            dotnet test "$SOLUTION"
            --configuration "$CONFIGURATION"
            --no-build
            --verbosity normal
            --logger "trx;LogFilePrefix=test-results"
            --results-directory artifacts/test-results
          )

          if [[ -n "$TEST_FILTER" ]]; then
            test_args+=(--filter "$TEST_FILTER")
          fi

          if [[ "$COVERAGE" == "true" ]]; then
            test_args+=('--collect:XPlat Code Coverage')
          fi

          "${test_args[@]}"

      - name: Checkout coverage action @ ${{ fromJSON(toJSON(job)).workflow_repository }}:${{ fromJSON(toJSON(job)).workflow_sha }}
        if: inputs.run-tests && inputs.coverage && inputs.coverage-report
        uses: actions/checkout@v7
        with:
          # fromJSON(toJSON(job)) is only there because our pinned actionlint:1.7.12 does not know the newer documented job.workflow_ref / job.workflow_sha fields.
          repository: ${{ fromJSON(toJSON(job)).workflow_repository }}
          ref: ${{ fromJSON(toJSON(job)).workflow_sha }}
          path: .ci/arkanis-ci
          persist-credentials: false
          sparse-checkout: |
            .github/actions/dotnet-coverage-report
          sparse-checkout-cone-mode: false

      - name: Generate coverage report @ ${{ inputs.coverage-reporttypes }}
        if: inputs.run-tests && inputs.coverage && inputs.coverage-report
        uses: ./.ci/arkanis-ci/.github/actions/dotnet-coverage-report
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          reports: artifacts/test-results/**/coverage.cobertura.xml
          targetdir: artifacts/coverage/report
          reporttypes: ${{ inputs.coverage-reporttypes }}
          assemblyfilters: ${{ inputs.coverage-assemblyfilters }}
          custom-settings: ${{ inputs.coverage-report-custom-settings }}
          tag: ${{ github.run_number }}_${{ github.run_id }}
          tool-version: ${{ inputs.coverage-report-tool-version }}
          comment-on-pr: ${{ inputs.coverage-pr-comment }}
          pr-number: ${{ github.event.number }}

      - name: Write run metadata @ artifacts/meta/run-metadata.json
        id: metadata
        if: always()
        env:
          RUNS_ON_JSON: ${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}
          TOOL_VERSIONS_JSON: ${{ steps.tool-versions.outputs.tool_versions_json || '{}' }}
        run: |
          mkdir -p artifacts/meta
          cat > artifacts/meta/run-metadata.json <<JSON
          {
            "schema": "run-metadata/v1",
            "repository": "${GITHUB_REPOSITORY}",
            "workflow": "wf-setup-dotnet",
            "sha": "${GITHUB_SHA}",
            "ref": "${GITHUB_REF}",
            "event_name": "${GITHUB_EVENT_NAME}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "runner": {
              "os": "${RUNNER_OS}",
              "arch": "${RUNNER_ARCH}",
              "labels": ${RUNS_ON_JSON}
            },
            "tool_versions": ${TOOL_VERSIONS_JSON}
          }
          JSON
          echo "path=artifacts/meta/run-metadata.json" >> "$GITHUB_OUTPUT"

      - name: Write artifact manifest @ artifacts/artifact-manifest.json
        id: manifest
        if: always()
        env:
          RETENTION_DAYS: ${{ inputs.artifact-retention-days }}
        run: |
          mkdir -p artifacts
          cat > artifacts/artifact-manifest.json <<JSON
          {
            "schema": "ci-artifact-manifest/v1",
            "producer": {
              "repository": "${GITHUB_REPOSITORY}",
              "workflow": "wf-setup-dotnet",
              "run_id": "${GITHUB_RUN_ID}",
              "run_attempt": "${GITHUB_RUN_ATTEMPT}",
              "sha": "${GITHUB_SHA}",
              "job": "verify"
            },
            "artifacts": [
              {
                "name": "${GITHUB_REPOSITORY#*/}-dotnet-setup-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}",
                "kind": "diagnostics",
                "paths": ["artifacts"],
                "retention_days": ${RETENTION_DAYS}
              }
            ]
          }
          JSON
          echo "path=artifacts/artifact-manifest.json" >> "$GITHUB_OUTPUT"

      - name: Publish summary @ ${{ steps.manifest.outputs.path || github.run_id }}
        if: always()
        env:
          SOLUTION: ${{ inputs.solution }}
          CONFIGURATION: ${{ inputs.configuration }}
          COVERAGE: ${{ inputs.coverage }}
          COVERAGE_REPORT: ${{ inputs.coverage-report }}
          COVERAGE_PR_COMMENT: ${{ inputs.coverage-pr-comment }}
          RUN_FORMAT: ${{ inputs.run-format }}
          RUN_TESTS: ${{ inputs.run-tests }}
        run: |
          {
            echo "# .NET setup verification"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Runs on self-hosted | \`${{ inputs.runs-on-self-hosted }}\` |"
            echo "| Runner labels | \`${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}\` |"
            echo "| Solution | \`${SOLUTION}\` |"
            echo "| Configuration | \`${CONFIGURATION}\` |"
            echo "| Format | \`${RUN_FORMAT}\` |"
            echo "| Tests | \`${RUN_TESTS}\` |"
            echo "| Coverage | \`${COVERAGE}\` |"
            echo "| Coverage report | \`${COVERAGE_REPORT}\` |"
            echo "| Coverage PR comment | \`${COVERAGE_PR_COMMENT}\` |"
            echo "| Artifact manifest | \`${{ steps.manifest.outputs.path }}\` |"
            echo "| Run metadata | \`${{ steps.metadata.outputs.path }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload diagnostics @ ${{ github.event.repository.name }}-dotnet-setup-${{ github.run_id }}-${{ github.run_attempt }}
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-dotnet-setup-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts
          if-no-files-found: warn
          retention-days: ${{ inputs.artifact-retention-days }}
