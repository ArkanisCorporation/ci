# Summary:
#   Reusable .NET Docker Buildx verification workflow for OCI images.
# Remarks:
#   This workflow stamps .NET project versions and builds the container without pushing.
#   It does not bind a GitHub environment or request registry, OIDC, package, or attestation permissions.

name: wf-verify-publish-container-dotnet

on:
  workflow_call:
    inputs:
      runs-on:
        description: Single runner label used when runs-on-json is empty.
        type: string
        required: false
        default: ubuntu-latest
      runs-on-json:
        description: JSON array passed to runs-on, including GitHub-hosted image labels or self-hosted runner labels. Overrides runs-on when set.
        type: string
        required: false
        default: ""
      runs-on-self-hosted:
        description: True when the effective runner selection targets self-hosted runners.
        type: boolean
        required: false
        default: false
      image:
        description: Fully-qualified image name without tag.
        type: string
        required: true
      context:
        description: Docker build context.
        type: string
        required: false
        default: .
      dockerfile:
        description: Dockerfile path.
        type: string
        required: false
        default: Dockerfile
      platforms:
        description: Comma-delimited target platforms.
        type: string
        required: false
        default: linux/amd64
      version:
        description: Required bare semantic version without leading v, used for .NET stamping and the VERSION Docker build argument.
        type: string
        required: true
      version-tag:
        description: Optional release version tag to apply to the image, usually prefixed with v.
        type: string
        required: false
        default: ""
      version-channel:
        description: Optional channel tag to apply.
        type: string
        required: false
        default: ""
      channel-latest:
        description: Adds a mutable <version-channel>-latest tag when version-channel is set.
        type: boolean
        required: false
        default: true
      extra-tags:
        description: Optional newline-delimited extra image tags. Bare tags expand as image:tag; full image references pass through.
        type: string
        required: false
        default: ""
      buildkit-endpoint:
        description: Optional remote BuildKit endpoint for self-hosted runners.
        type: string
        required: false
        default: ""
      build-args:
        description: Optional newline-delimited Docker build arguments. Do not pass secrets here because Docker build args can persist in image metadata or logs.
        type: string
        required: false
        default: ""
      sdk-version:
        description: .NET SDK version used by the dotnet-setversion action.
        type: string
        required: false
        default: 10.0.x
      global-json-file:
        description: Optional global.json path passed to actions/setup-dotnet for version stamping.
        type: string
        required: false
        default: ""
      version-working-directory:
        description: Working directory whose csproj files are stamped before Docker Buildx.
        type: string
        required: false
        default: .
      version-recursive:
        description: Recursively stamps csproj files under version-working-directory when true.
        type: boolean
        required: false
        default: true
      version-project:
        description: Optional project path passed to setversion when recursive stamping is false.
        type: string
        required: false
        default: ""
      version-tool-version:
        description: dotnet-setversion tool package version installed by the composite action.
        type: string
        required: false
        default: 4.0.0
      enable-cache:
        description: Enables the generated GitHub Actions BuildKit cache when cache-from and cache-to are empty.
        type: boolean
        required: false
        default: true
      cache-from:
        description: Optional Docker Buildx cache-from value. Overrides the generated GitHub Actions cache when set.
        type: string
        required: false
        default: ""
      cache-to:
        description: Optional Docker Buildx cache-to value. Overrides the generated GitHub Actions cache when set.
        type: string
        required: false
        default: ""
      labels:
        description: Optional newline-delimited OCI labels.
        type: string
        required: false
        default: ""
      timeout-minutes:
        description: Verification job timeout.
        type: number
        required: false
        default: 45
      artifact-retention-days:
        description: Metadata artifact retention in days.
        type: number
        required: false
        default: 30
    outputs:
      metadata:
        description: Build metadata JSON produced by docker/build-push-action.
        value: ${{ jobs.verify.outputs.metadata }}
      artifact-manifest:
        description: Path to the generated artifact manifest.
        value: ${{ jobs.verify.outputs.artifact-manifest }}

permissions: {}

jobs:
  verify:
    name: ${{ inputs.version || inputs.version-tag }}
    runs-on: ${{ fromJSON(inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest'))) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    outputs:
      metadata: ${{ steps.build.outputs.metadata }}
      artifact-manifest: ${{ steps.manifest.outputs.path }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout caller @ ${{ github.repository }}:${{ github.head_ref || github.ref_name }}
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Validate runner contract @ ${{ inputs.runs-on-json || inputs.runs-on || 'ubuntu-latest' }}
        env:
          RUNS_ON_SELF_HOSTED: ${{ inputs.runs-on-self-hosted }}
          RUNS_ON_JSON: ${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}
          BUILDKIT_ENDPOINT: ${{ inputs.buildkit-endpoint }}
          ENABLE_CACHE: ${{ inputs.enable-cache }}
        run: |
          mkdir -p artifacts/container artifacts/meta
          {
            echo "Runs on self-hosted: ${RUNS_ON_SELF_HOSTED}"
            echo "Requested runner labels: ${RUNS_ON_JSON}"
            echo "Runner OS: ${RUNNER_OS}"
            echo "Runner arch: ${RUNNER_ARCH}"
            echo "Remote BuildKit endpoint configured: $([[ -n "$BUILDKIT_ENDPOINT" ]] && echo true || echo false)"
            echo "BuildKit cache enabled: ${ENABLE_CACHE}"
            echo ".NET version stamping: true"
          } | tee artifacts/meta/runner-contract.txt

      - name: Validate container publish inputs @ ${{ inputs.image }}:${{ inputs.version || inputs.version-tag }}
        env:
          VERSION: ${{ inputs.version }}
          VERSION_PROJECT: ${{ inputs.version-project }}
          VERSION_RECURSIVE: ${{ inputs.version-recursive }}
        run: |
          if [[ -z "$VERSION" ]]; then
            echo "version is required for .NET container publishing." >&2
            exit 2
          fi

          if [[ "$VERSION" =~ ^[vV] ]]; then
            echo "version must be a bare semantic version without leading v. Use version-tag for Docker tags." >&2
            exit 2
          fi

          if [[ "$VERSION_RECURSIVE" == "true" && -n "$VERSION_PROJECT" ]]; then
            echo "version-project requires version-recursive to be false." >&2
            exit 2
          fi

      - name: Self-hosted preflight @ ${{ inputs.runs-on-json || inputs.runs-on || 'ubuntu-latest' }}
        if: inputs.runs-on-self-hosted
        run: |
          {
            echo "## Self-hosted runner preflight"
            echo
            df -h .
            echo
            command -v docker
            docker version
          } | tee artifacts/meta/self-hosted-preflight.txt

      - name: Checkout platform action @ ${{ fromJSON(toJSON(job)).workflow_repository }}:${{ fromJSON(toJSON(job)).workflow_sha }}
        uses: actions/checkout@v7
        with:
          # fromJSON(toJSON(job)) is only there because our pinned actionlint:1.7.12 does not know the newer documented job.workflow_ref / job.workflow_sha fields.
          repository: ${{ fromJSON(toJSON(job)).workflow_repository }}
          ref: ${{ fromJSON(toJSON(job)).workflow_sha }}
          path: .ci/arkanis-ci
          persist-credentials: false
          sparse-checkout: |
            .github/actions/dotnet-setversion
          sparse-checkout-cone-mode: false

      - name: Stamp .NET projects @ ${{ inputs.version }}
        uses: ./.ci/arkanis-ci/.github/actions/dotnet-setversion
        with:
          version: ${{ inputs.version }}
          working-directory: ${{ inputs.version-working-directory }}
          dotnet-version: ${{ inputs.sdk-version }}
          global-json-file: ${{ inputs.global-json-file }}
          recursive: ${{ inputs.version-recursive }}
          project: ${{ inputs.version-project }}
          tool-version: ${{ inputs.version-tool-version }}

      - name: Set up Docker Buildx @ local
        if: inputs.buildkit-endpoint == ''
        uses: docker/setup-buildx-action@v4

      - name: Set up Docker Buildx @ remote
        if: inputs.buildkit-endpoint != ''
        uses: docker/setup-buildx-action@v4
        with:
          driver: remote
          endpoint: ${{ inputs.buildkit-endpoint }}

      - name: Resolve image tags @ ${{ inputs.image }}:${{ inputs.version || inputs.version-tag }}
        id: tags
        env:
          IMAGE: ${{ inputs.image }}
          VERSION_TAG: ${{ inputs.version-tag }}
          VERSION_CHANNEL: ${{ inputs.version-channel }}
          CHANNEL_LATEST: ${{ inputs.channel-latest }}
          EXTRA_TAGS: ${{ inputs.extra-tags }}
        run: |
          short_sha="${GITHUB_SHA::12}"
          {
            echo "tags<<TAGS"
            echo "${IMAGE}:sha-${short_sha}"
            if [[ -n "$VERSION_TAG" ]]; then
              echo "${IMAGE}:${VERSION_TAG}"
            fi
            if [[ -n "$VERSION_CHANNEL" ]]; then
              echo "${IMAGE}:${VERSION_CHANNEL}"
              if [[ "$CHANNEL_LATEST" == "true" ]]; then
                echo "${IMAGE}:${VERSION_CHANNEL}-latest"
              fi
            fi
            while IFS= read -r extra_tag; do
              extra_tag="${extra_tag#"${extra_tag%%[![:space:]]*}"}"
              extra_tag="${extra_tag%"${extra_tag##*[![:space:]]}"}"
              if [[ -z "$extra_tag" ]]; then
                continue
              fi
              if [[ "$extra_tag" == *"/"* ]]; then
                echo "$extra_tag"
              else
                echo "${IMAGE}:${extra_tag}"
              fi
            done <<< "$EXTRA_TAGS"
            echo "TAGS"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve Docker build args @ VERSION=${{ inputs.version }}
        id: build-args
        env:
          VERSION: ${{ inputs.version }}
          BUILD_ARGS: ${{ inputs.build-args }}
        run: |
          {
            echo "value<<BUILD_ARGS"
            if [[ -n "$BUILD_ARGS" ]]; then
              printf '%s\n' "$BUILD_ARGS"
            fi
            if ! grep -Eq '(^|[[:space:]])VERSION=' <<< "$BUILD_ARGS"; then
              printf 'VERSION=%s\n' "$VERSION"
            fi
            echo "BUILD_ARGS"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve Docker Buildx cache @ ${{ inputs.image }}
        id: build-cache
        env:
          ENABLE_CACHE: ${{ inputs.enable-cache }}
          CACHE_FROM: ${{ inputs.cache-from }}
          CACHE_TO: ${{ inputs.cache-to }}
          IMAGE: ${{ inputs.image }}
          CONTEXT: ${{ inputs.context }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          mkdir -p artifacts/meta

          slug() {
            local value="$1"
            value="$(printf '%s' "$value" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9._-' '-' | sed -E 's/-+/-/g; s/^-//; s/-$//')"
            value="${value:0:64}"
            printf '%s' "${value:-default}"
          }

          scope=""
          cache_from=""
          cache_to=""

          if [[ "$ENABLE_CACHE" == "true" ]]; then
            if [[ -n "$CACHE_FROM" || -n "$CACHE_TO" ]]; then
              cache_from="$CACHE_FROM"
              cache_to="$CACHE_TO"
            else
              scope="container-$(slug "$IMAGE")-$(slug "$CONTEXT")-$(slug "$DOCKERFILE")-$(slug "$PLATFORMS")"
              cache_from="type=gha,scope=${scope}"
              cache_to="type=gha,scope=${scope},mode=max"
            fi
          fi

          {
            echo "BuildKit cache enabled: ${ENABLE_CACHE}"
            echo "Default cache scope: ${scope:-none}"
            echo "Cache from: $([[ -n "$cache_from" ]] && echo configured || echo none)"
            echo "Cache to: $([[ -n "$cache_to" ]] && echo configured || echo none)"
          } | tee artifacts/meta/docker-cache.txt

          {
            echo "cache_from<<CACHE_FROM"
            printf '%s\n' "$cache_from"
            echo "CACHE_FROM"
            echo "cache_to<<CACHE_TO"
            printf '%s\n' "$cache_to"
            echo "CACHE_TO"
            echo "scope=${scope}"
          } >> "$GITHUB_OUTPUT"

      - name: Build image (Dry Run) @ ${{ inputs.image }}
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: false
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ inputs.labels }}
          build-args: ${{ steps.build-args.outputs.value }}
          cache-from: ${{ steps.build-cache.outputs.cache_from }}
          cache-to: ${{ steps.build-cache.outputs.cache_to }}
          sbom: false
          provenance: false

      - name: Write image metadata @ ${{ steps.build.outputs.digest || inputs.image }}
        id: manifest
        if: always()
        env:
          RETENTION_DAYS: ${{ inputs.artifact-retention-days }}
          METADATA: ${{ steps.build.outputs.metadata }}
        run: |
          mkdir -p artifacts/container
          printf '%s\n' "$METADATA" > artifacts/container/build-metadata.json
          cat > artifacts/artifact-manifest.json <<JSON
          {
            "schema": "ci-artifact-manifest/v1",
            "producer": {
              "repository": "${GITHUB_REPOSITORY}",
              "workflow": "wf-verify-publish-container-dotnet",
              "run_id": "${GITHUB_RUN_ID}",
              "run_attempt": "${GITHUB_RUN_ATTEMPT}",
              "sha": "${GITHUB_SHA}",
              "job": "verify"
            },
            "artifacts": [
              {
                "name": "${GITHUB_REPOSITORY#*/}-container-verify-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}",
                "kind": "image-metadata",
                "paths": ["artifacts/container"],
                "retention_days": ${RETENTION_DAYS}
              }
            ]
          }
          JSON
          echo "path=artifacts/artifact-manifest.json" >> "$GITHUB_OUTPUT"

      - name: Publish summary @ ${{ steps.build.outputs.digest || inputs.image }}
        if: always()
        env:
          IMAGE: ${{ inputs.image }}
          VERSION: ${{ inputs.version }}
          VERSION_CHANNEL: ${{ inputs.version-channel }}
          CHANNEL_LATEST: ${{ inputs.channel-latest }}
          EXTRA_TAGS: ${{ inputs.extra-tags }}
          SDK_VERSION: ${{ inputs.sdk-version }}
          CACHE_SCOPE: ${{ steps.build-cache.outputs.scope }}
        run: |
          {
            echo "# .NET container verification"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Runs on self-hosted | \`${{ inputs.runs-on-self-hosted }}\` |"
            echo "| Runner labels | \`${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}\` |"
            echo "| Image | \`${IMAGE}\` |"
            echo "| Version | \`${VERSION}\` |"
            echo "| .NET SDK | \`${SDK_VERSION}\` |"
            echo "| Version channel | \`${VERSION_CHANNEL:-none}\` |"
            echo "| Channel latest | \`${CHANNEL_LATEST}\` |"
            echo "| Extra tags | \`${EXTRA_TAGS:-none}\` |"
            echo "| BuildKit cache | \`${{ inputs.enable-cache }}\` |"
            echo "| BuildKit cache scope | \`${CACHE_SCOPE:-none}\` |"
            echo "| Manifest | \`${{ steps.manifest.outputs.path }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload container metadata @ ${{ github.event.repository.name }}-container-verify-${{ github.run_id }}-${{ github.run_attempt }}
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-container-verify-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts
          if-no-files-found: warn
          retention-days: ${{ inputs.artifact-retention-days }}
