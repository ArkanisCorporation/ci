# Summary:
#   Sets up .NET SDK, NuGet cache, local tools, runner diagnostics, and optional restore.
# Remarks:
#   This composite action expects Bash and actions/setup-dotnet.
#   It writes NUGET_PACKAGES to GITHUB_ENV when nuget-packages is not empty.
#   It calls runs-on/cache only when enable-cache is true.
#   It does not run format, build, test, publish, or deploy commands.
#   Reusable workflows from this repository should not call it by relative path when consumed externally unless the platform repository has been checked out into that path first.

name: Setup .NET
description: Sets up .NET, NuGet cache, local tools, runner diagnostics, and optional restore for CI jobs.

inputs:
  runs-on:
    description: Single runner label used when runs-on-json is empty.
    required: false
    default: ubuntu-latest
  runs-on-json:
    description: JSON array passed to runs-on, including GitHub-hosted image labels or self-hosted runner labels.
    required: false
    default: ""
  runs-on-self-hosted:
    description: True when the effective runner selection targets self-hosted runners.
    required: false
    default: "false"
  dotnet-version:
    description: .NET SDK version range to install when global-json-file is not authoritative.
    required: false
    default: 10.0.x
  global-json-file:
    description: Optional global.json path.
    required: false
    default: ""
  cache-dependency-path:
    description: Glob used by runs-on/cache for dependency cache invalidation.
    required: false
    default: "**/packages.lock.json"
  enable-cache:
    description: Runs runs-on/cache for NuGet packages when true. Set false for cold-restore validation or runners without cache service access.
    required: false
    default: "true"
  nuget-packages:
    description: Optional NUGET_PACKAGES path written to GITHUB_ENV before setup.
    required: false
    default: ${{ github.workspace }}/.nuget/packages
  restore-tools:
    description: Restores local .NET tools with one retry for first-use SDK home races.
    required: false
    default: "true"
  working-directory:
    description: Directory where local tool restore and optional dependency restore run.
    required: false
    default: "."
  solution:
    description: Optional solution or project path to restore.
    required: false
    default: ""
  restore-locked-mode:
    description: Runs dotnet restore with --locked-mode when solution is set.
    required: false
    default: "true"
  nuget-auth-json:
    description: Optional NUGET_AUTH_JSON document containing private package source credentials.
    required: false
    default: ""
  op-service-account-token:
    description: Optional 1Password service account token used when nuget-auth-json contains op:// references.
    required: false
    default: ""

outputs:
  dotnet-version:
    description: The SDK version selected by actions/setup-dotnet.
    value: ${{ steps.setup-dotnet.outputs.dotnet-version }}
  cache-hit:
    description: Whether dependency cache restored an exact match.
    value: ${{ steps.nuget-cache.outputs.cache-hit }}
  tool-versions-json:
    description: JSON object with selected .NET tool versions.
    value: ${{ steps.tool-versions.outputs.tool-versions-json }}
  nuget-auth-configured:
    description: Whether private NuGet credentials were configured for restore.
    value: ${{ steps.nuget-auth.outputs.configured || 'false' }}
  nuget-auth-source-count:
    description: Number of private NuGet credential sources configured for restore.
    value: ${{ steps.nuget-auth.outputs.source-count || '0' }}

runs:
  using: composite
  steps:
    - name: Configure NuGet package cache path
      if: inputs.nuget-packages != ''
      run: echo "NUGET_PACKAGES=${{ inputs.nuget-packages }}" >> "$GITHUB_ENV"
      shell: bash

    - name: Setup .NET
      id: setup-dotnet
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: ${{ inputs.dotnet-version }}
        global-json-file: ${{ inputs.global-json-file }}

    - name: Prepare private NuGet auth references
      id: nuget-auth-prepare
      if: inputs.nuget-auth-json != ''
      run: dotnet run --file "$GITHUB_ACTION_PATH/../setup-nuget-auth/configure-nuget-auth.cs" --no-launch-profile
      shell: bash
      env:
        NUGET_AUTH_JSON_INPUT: ${{ inputs.nuget-auth-json }}
        NUGET_AUTH_PHASE: prepare
        NUGET_AUTH_OP_ENV_FILE: ${{ runner.temp }}/nuget-auth/op.env
        NUGET_AUTH_OP_MAP_FILE: ${{ runner.temp }}/nuget-auth/op-map.json
        GITHUB_TOKEN_FOR_NUGET_AUTH: ${{ env.GITHUB_TOKEN_FOR_NUGET_AUTH }}

    - name: Require private NuGet 1Password token
      if: steps.nuget-auth-prepare.outputs.op-required == 'true' && inputs.op-service-account-token == ''
      run: |
        echo "::error::op-service-account-token is required when nuget-auth-json contains op:// references."
        exit 2
      shell: bash

    - name: Load private NuGet auth values from 1Password
      if: steps.nuget-auth-prepare.outputs.op-required == 'true'
      uses: 1password/load-secrets-action@v4
      with:
        export-env: true
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ inputs.op-service-account-token }}
        OP_ENV_FILE: ${{ steps.nuget-auth-prepare.outputs.op-env-file }}

    - name: Apply private NuGet auth credentials
      id: nuget-auth
      if: inputs.nuget-auth-json != ''
      run: dotnet run --file "$GITHUB_ACTION_PATH/../setup-nuget-auth/configure-nuget-auth.cs" --no-launch-profile
      shell: bash
      env:
        NUGET_AUTH_JSON_INPUT: ${{ inputs.nuget-auth-json }}
        NUGET_AUTH_PHASE: apply
        NUGET_AUTH_CREDENTIAL_MODE: env
        NUGET_AUTH_OP_MAP_FILE: ${{ steps.nuget-auth-prepare.outputs.op-map-file }}
        GITHUB_TOKEN_FOR_NUGET_AUTH: ${{ env.GITHUB_TOKEN_FOR_NUGET_AUTH }}

    - name: Cache NuGet packages
      if: inputs.enable-cache == 'true'
      id: nuget-cache
      uses: runs-on/cache@v5.0.7
      with:
        path: ${{ inputs.nuget-packages }}
        key: ${{ runner.os }}-nuget-${{ hashFiles(inputs.cache-dependency-path, '.config/dotnet-tools.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Record .NET setup
      id: tool-versions
      run: |
        mkdir -p artifacts/meta
        dotnet --info | tee artifacts/meta/dotnet-info.txt
        dotnet_version="$(dotnet --version)"
        printf 'tool-versions-json={"dotnet":"%s"}\n' "$dotnet_version" >> "$GITHUB_OUTPUT"
        {
          echo "Using .NET ${{ steps.setup-dotnet.outputs.dotnet-version }}"
          echo "NuGet cache enabled: ${{ inputs.enable-cache }}"
          echo "NuGet cache hit: ${{ steps.nuget-cache.outputs.cache-hit || 'false' }}"
          echo "Private NuGet auth configured: ${{ steps.nuget-auth.outputs.configured || 'false' }}"
          echo "Private NuGet auth source count: ${{ steps.nuget-auth.outputs.source-count || '0' }}"
        } | tee artifacts/meta/dotnet-setup.txt
      shell: bash

    - name: Validate runner contract
      env:
        RUNS_ON_SELF_HOSTED: ${{ inputs.runs-on-self-hosted }}
        RUNS_ON_JSON: ${{ inputs.runs-on-json || format('[{0}]', toJSON(inputs.runs-on || 'ubuntu-latest')) }}
        ENABLE_CACHE: ${{ inputs.enable-cache }}
      run: |
        {
          echo "Runs on self-hosted: ${RUNS_ON_SELF_HOSTED}"
          echo "Requested runner labels: ${RUNS_ON_JSON}"
          echo "NuGet cache enabled: ${ENABLE_CACHE}"
          echo "NuGet cache hit: ${{ steps.nuget-cache.outputs.cache-hit || 'false' }}"
          echo "Runner OS: ${RUNNER_OS}"
          echo "Runner arch: ${RUNNER_ARCH}"
          echo "Workspace: ${GITHUB_WORKSPACE}"
        } | tee artifacts/meta/runner-contract.txt
      shell: bash

    - name: Self-hosted preflight
      if: inputs.runs-on-self-hosted == 'true'
      run: |
        {
          echo "## Self-hosted runner preflight"
          echo
          echo "Disk:"
          df -h .
          echo
          echo "Temp:"
          printf '%s\n' "${RUNNER_TEMP:-unset}"
          echo
          echo "Required tools:"
          command -v dotnet
          command -v git
        } | tee artifacts/meta/self-hosted-preflight.txt
      shell: bash

    - name: Restore local .NET tools
      if: inputs.restore-tools == 'true'
      env:
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: |
        cd "$WORKING_DIRECTORY"
        dotnet tool restore || (echo "First dotnet tool restore failed; retrying once." && dotnet tool restore)
      shell: bash

    - name: Restore solution with lock file
      if: inputs.solution != '' && inputs.restore-locked-mode == 'true'
      env:
        SOLUTION: ${{ inputs.solution }}
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: |
        cd "$WORKING_DIRECTORY"
        dotnet restore "$SOLUTION" --locked-mode
      shell: bash

    - name: Restore solution
      if: inputs.solution != '' && inputs.restore-locked-mode != 'true'
      env:
        SOLUTION: ${{ inputs.solution }}
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: |
        cd "$WORKING_DIRECTORY"
        dotnet restore "$SOLUTION"
      shell: bash

    - name: Clear private NuGet auth credentials
      if: always() && steps.nuget-auth.outputs.configured == 'true'
      run: dotnet run --file "$GITHUB_ACTION_PATH/../setup-nuget-auth/configure-nuget-auth.cs" --no-launch-profile
      shell: bash
      env:
        NUGET_AUTH_PHASE: cleanup
        NUGET_AUTH_OP_ENV_FILE: ${{ steps.nuget-auth-prepare.outputs.op-env-file }}
        NUGET_AUTH_OP_MAP_FILE: ${{ steps.nuget-auth-prepare.outputs.op-map-file }}
        NUGET_AUTH_CONFIGURED_SOURCE_NAMES: ${{ steps.nuget-auth.outputs.source-names }}
